// ── STOREFRONT PAGE ──

function StorefrontPage({ biz, setPage, user, vendorSettings, onProductClick, products = [], businesses = [] }) {
  const [typeFilter, setTypeFilter] = useState("all");
  const [searchQ, setSearchQ] = useState("");
  const [showPhone, setShowPhone] = useState(false);
  const [sortBy, setSortBy] = useState("default");

  // isOwn = vendor viewing their own store (biz is null)
  // visiting = customer viewing another vendor's store (biz is a business object)
  const isOwn = !biz;

  // Store identity — pull from vendorSettings (own) or business object (visiting)
  const name     = isOwn ? (vendorSettings.bizName || "My Store")     : (biz.name || "Store");
  const desc     = isOwn ? (vendorSettings.bizDesc || "")             : (biz.desc || "");
  const location = isOwn ? (vendorSettings.bizLocation || "Lagos")    : (biz.location || "Lagos");
  const phone    = isOwn ? (vendorSettings.bizPhone || "")            : (biz?.bizPhone || biz?.phone || "");
  const waNum    = isOwn ? (vendorSettings.whatsapp || "")            : (biz.whatsapp || "");
  const hasWa    = sanitizePhoneNumber(waNum).length > 5;
  const category = isOwn ? (vendorSettings.bizCategory || "fashion")  : (biz.category || "fashion");
  const verified = isOwn
    ? !!user?.phoneVerified
    : !!(biz?.phoneVerified || biz?.vendorPhoneVerified || biz?.ownerPhoneVerified);
  const sponsored = isOwn ? !!vendorSettings?.sponsored : !!biz?.sponsored;
  const showStockCount = isOwn ? (vendorSettings.showStockCount !== false) : (biz?.showStockCount !== false);
  const tags     = isOwn
    ? [CATEGORIES.find(c=>c.id===category)?.label || "Fashion"]
    : (biz.tags || []);
  const logoImg = isOwn ? (vendorSettings.logo || "") : (biz?.logo || "");
  const bannerImg = isOwn ? (vendorSettings.banner || "") : (biz?.banner || biz?.img || biz?.logo || "");
  const defaultBanner = "https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=1400&h=500&fit=crop";
  const waHref = buildWhatsAppHref(waNum, "Hi, I'd like to know more about your store on LBC!");

  // Products: filter live API data by store ID (own store uses vendorSettings.storeId)
  const bizProducts = (isOwn
    ? products.filter(p => p.storeId === vendorSettings.storeId)
    : products.filter(p => p.storeId === biz?.id)
  ).map(p => ({...p, type: p.type || "physical"}));

  const totalReviews = bizProducts.reduce((sum, item) => sum + Number(item.reviews || 0), 0);
  const weightedRating = bizProducts.reduce((sum, item) => {
    const reviewCount = Number(item.reviews || 0);
    const ratingValue = Number(item.rating || 0);
    return sum + (ratingValue * reviewCount);
  }, 0);
  const avgRating = totalReviews > 0
    ? (weightedRating / totalReviews)
    : (bizProducts.length > 0
      ? bizProducts.reduce((sum, item) => sum + Number(item.rating || 0), 0) / bizProducts.length
      : 0);

  const storeCreatedAt = isOwn ? vendorSettings.storeCreatedAt : biz?.createdAt;
  const memberSince = storeCreatedAt
    ? new Date(storeCreatedAt).toLocaleDateString('en-NG', { month: 'short', year: 'numeric' })
    : '—';

  const filtered = bizProducts.filter(p => {
    const matchType = typeFilter === "all" || p.type === typeFilter;
    const matchSearch = !searchQ || p.name.toLowerCase().includes(searchQ.toLowerCase());
    return matchType && matchSearch;
  });

  const sorted = [...filtered].sort((a,b) => {
    if (sortBy==="price-asc") return a.price - b.price;
    if (sortBy==="price-desc") return b.price - a.price;
    return 0;
  });

  const counts = {
    all:      bizProducts.length,
    physical: bizProducts.filter(p=>p.type==="physical").length,
    digital:  bizProducts.filter(p=>p.type==="digital").length,
    service:  bizProducts.filter(p=>p.type==="service" || p.type==="services").length,
  };

  return (
    <div style={{background:"var(--offwhite)",minHeight:"100vh"}}>

      {/* ── HERO BANNER ── */}
      <div style={{position:"relative",height:"clamp(180px, 35vw, 280px)",overflow:"hidden",background:"var(--navy)"}}>
        <img src={bannerImg||defaultBanner} alt="Store banner"
          style={{width:"100%",height:"100%",objectFit:"cover",opacity:.5}} />
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(6,13,31,.1) 0%,rgba(6,13,31,.7) 100%)"}} />

        {/* Back btn */}
        <button className="storefront-back-btn" onClick={()=>window.history.length>1?window.history.back():setPage("home")} style={{position:"absolute",top:"1.25rem",left:"1.5rem",background:"rgba(255,255,255,.15)",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",borderRadius:8,padding:".5rem 1rem",fontSize:".82rem",fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:".4rem"}}>
          ← Back
        </button>

        {/* Sponsor badge */}
        {sponsored && (
          <div className="storefront-badge" style={{position:"absolute",top:"1.25rem",right:"1.5rem",background:"var(--amber)",color:"#7c3e00",borderRadius:8,padding:".3rem .75rem",fontSize:".72rem",fontWeight:800,letterSpacing:".04em"}}>
            ⚡ SPONSORED
          </div>
        )}

        {/* Store name overlay */}
        <div className="storefront-hero-meta" style={{position:"absolute",bottom:"1.5rem",left:"1.75rem",right:"1.75rem",display:"flex",alignItems:"flex-end",gap:"1rem"}}>
          {/* Logo circle */}
          <div style={{width:72,height:72,borderRadius:16,border:"3px solid rgba(255,255,255,.3)",background:"rgba(255,255,255,.15)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne",fontWeight:900,fontSize:"1.8rem",color:"#fff",flexShrink:0,overflow:"hidden"}}>
            {logoImg
              ? <img src={logoImg} alt={`${name} logo`} style={{width:"100%",height:"100%",objectFit:"cover"}} />
              : name[0]?.toUpperCase()}
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:".65rem",flexWrap:"wrap"}}>
              <a
                href={buildAppUrl("storefront", { biz: isOwn ? { id: vendorSettings.storeId, slug: slugifyRoutePart(vendorSettings.bizName || "My Store") } : { id: biz?.id, slug: slugifyRoutePart(biz?.name || "Store") } })}
                style={{ textDecoration: "none" }}
              >
                <h1 style={{fontFamily:"Syne",fontWeight:900,fontSize:"1.8rem",color:"#fff",margin:0,textShadow:"0 2px 8px rgba(0,0,0,.3)",display:"inline"}}>{name}</h1>
              </a>
              {verified&&<span style={{background:"rgba(0,102,255,.9)",color:"#fff",fontSize:".7rem",fontWeight:700,padding:".2rem .6rem",borderRadius:6}}>✓ Verified</span>}
            </div>
            <div style={{display:"flex",gap:".6rem",marginTop:".4rem",flexWrap:"wrap"}}>
              {tags.map(t=><span key={t} style={{background:"rgba(255,255,255,.15)",backdropFilter:"blur(4px)",color:"rgba(255,255,255,.9)",fontSize:".72rem",fontWeight:600,padding:".2rem .6rem",borderRadius:5}}>{t}</span>)}
              <span style={{background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.7)",fontSize:".72rem",padding:".2rem .6rem",borderRadius:5}}>📍 {location}</span>
              {showStockCount && <span style={{background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.7)",fontSize:".72rem",padding:".2rem .6rem",borderRadius:5}}>📦 {sorted.length} available</span>}
            </div>
          </div>
        </div>
      </div>

      {/* ── BODY ── */}
      <div className="storefront-layout" style={{maxWidth:1280,margin:"0 auto",padding:"2rem 1.5rem",display:"grid",gridTemplateColumns:"280px 1fr",gap:"2rem",alignItems:"start"}}>

        {/* ── LEFT SIDEBAR ── */}
        <div className="storefront-side-column" style={{display:"flex",flexDirection:"column",gap:"1rem",position:"sticky",top:80}}>

          {/* About */}
          <div style={{background:"#fff",borderRadius:16,padding:"1.4rem",border:"1px solid var(--g200)"}}>
            <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:".95rem",marginBottom:"1rem",color:"var(--navy)"}}>About</h3>
            {desc
              ? <p style={{fontSize:".85rem",lineHeight:1.7,color:"var(--g700)"}}>{desc}</p>
              : <p style={{fontSize:".85rem",color:"var(--muted)",fontStyle:"italic"}}>No description yet. Add one in your store settings.</p>}
          </div>

          {/* Contact */}
          <div style={{background:"#fff",borderRadius:16,padding:"1.4rem",border:"1px solid var(--g200)"}}>
            <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:".95rem",marginBottom:"1rem",color:"var(--navy)"}}>Contact</h3>
            <div style={{display:"flex",flexDirection:"column",gap:".85rem"}}>
              <div style={{display:"flex",gap:".65rem",alignItems:"flex-start",fontSize:".85rem"}}>
                <span style={{color:"var(--muted)",flexShrink:0,marginTop:1}}>📍</span>
                <span style={{color:"var(--g700)",fontWeight:500}}>{location}</span>
              </div>
              <div style={{display:"flex",gap:".65rem",alignItems:"flex-start",fontSize:".85rem"}}>
                <span style={{color:"var(--muted)",flexShrink:0,marginTop:1}}>📞</span>
                <div style={{flex:1}}>
                  {phone
                    ? (showPhone
                      ? <span style={{color:"var(--navy)",fontWeight:700}}>{phone}</span>
                      : <button onClick={()=>setShowPhone(true)} style={{background:"none",border:"none",color:"var(--blue)",fontWeight:600,cursor:"pointer",padding:0,fontSize:".85rem"}}>Show number</button>)
                    : <span style={{color:"var(--muted)",fontSize:".82rem"}}>No phone number provided</span>}
                </div>
              </div>
              {(isOwn ? vendorSettings.bizEmail : biz?.bizEmail) && (
                <div style={{display:"flex",gap:".65rem",alignItems:"flex-start",fontSize:".85rem"}}>
                  <span style={{color:"var(--muted)",flexShrink:0,marginTop:1}}>✉️</span>
                  <span style={{color:"var(--g700)"}}>{isOwn ? vendorSettings.bizEmail : biz?.bizEmail}</span>
                </div>
              )}
            </div>

            {/* WhatsApp CTA */}
            <div style={{marginTop:"1.1rem"}}>
              {hasWa ? (
                <a href={waHref} target={window.innerWidth <= 768 ? "_self" : "_blank"} rel="noopener noreferrer"
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:".6rem",background:"#25D366",color:"#fff",borderRadius:10,padding:".85rem",fontWeight:800,fontSize:".9rem",textDecoration:"none",transition:"all .2s",boxShadow:"0 4px 12px rgba(37,211,102,.25)"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="#20bb5a";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="#25D366";}}>
                  💬 Chat on WhatsApp
                </a>
              ) : (
                <div title="This vendor hasn't added a WhatsApp number"
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:".6rem",background:"var(--g200)",color:"var(--muted)",borderRadius:10,padding:".85rem",fontWeight:700,fontSize:".88rem",cursor:"not-allowed"}}>
                  💬 WhatsApp Unavailable
                </div>
              )}
            </div>
          </div>

          {/* Stats */}
          <div style={{background:"var(--navy)",borderRadius:16,padding:"1.4rem",color:"#fff"}}>
            <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:".9rem",marginBottom:"1rem",color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:".06em"}}>Store Stats</h3>
            {[
              {label:"Total Listings",val:bizProducts.length},
              {label:"Avg. Rating",val:avgRating > 0 ? `${avgRating.toFixed(1)} ⭐` : "No ratings yet"},
              {label:"Response Time",val:"<1hour"},
              {label:"Member Since",val:memberSince},
            ].map(s=>(
              <div key={s.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:".6rem 0",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
                <span style={{fontSize:".78rem",color:"rgba(255,255,255,.45)"}}>{s.label}</span>
                <span style={{fontSize:".85rem",fontWeight:700,color:"#fff"}}>{s.val}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ── RIGHT — Products ── */}
        <div>
          {/* Toolbar */}
          <div className="storefront-toolbar" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:"1rem"}}>
            <div>
              <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.2rem",margin:0}}>Products & Services</h2>
              <p style={{color:"var(--muted)",fontSize:".8rem",margin:".15rem 0 0"}}>{showStockCount ? `${sorted.length} listing${sorted.length!==1?"s":""}` : "Listings available"}</p>
            </div>
            {/* Search within store */}
            <div className="storefront-toolbar-search" style={{display:"flex",gap:".6rem",alignItems:"center",flex:1,maxWidth:320}}>
              <div style={{flex:1,display:"flex",background:"#fff",border:"1px solid var(--g200)",borderRadius:8,overflow:"hidden"}}>
                <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder={`Search ${name}…`}
                  style={{flex:1,border:"none",outline:"none",padding:".6rem .9rem",fontSize:".85rem"}} />
                <button style={{background:"none",border:"none",padding:"0 .75rem",cursor:"pointer",color:"var(--muted)"}}>🔍</button>
              </div>
            </div>
          </div>

          {/* Type filter tabs */}
          <div className="storefront-type-filters" style={{display:"flex",gap:".5rem",marginBottom:"1.25rem",background:"#fff",borderRadius:12,padding:".4rem",border:"1px solid var(--g200)",overflowX:"auto",scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
            {[
              {id:"all",    label:`All (${counts.all})`},
              {id:"physical",label:`📦 Physical (${counts.physical})`},
              {id:"digital", label:`💾 Digital (${counts.digital})`},
              {id:"service", label:`🔧 Services (${counts.service})`},
            ].map(t=>(
              <button key={t.id} onClick={()=>setTypeFilter(t.id)}
                style={{padding:".5rem 1rem",borderRadius:8,border:"none",background:typeFilter===t.id?"var(--navy)":"transparent",color:typeFilter===t.id?"#fff":"var(--g700)",fontWeight:typeFilter===t.id?700:500,fontSize:".82rem",cursor:"pointer",transition:"all .2s",whiteSpace:"nowrap"}}>
                {t.label}
              </button>
            ))}
          </div>

          {/* Sort row */}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"1rem"}}>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
              style={{padding:".5rem .9rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".82rem",color:"var(--g700)",background:"#fff",outline:"none"}}>
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
            </select>
          </div>

          {/* Product grid */}
          {sorted.length > 0 ? (
            <div className="storefront-products-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(220px,100%),1fr))",gap:"1.25rem"}}>
              {sorted.map(p=>(
                <div key={p.id} style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid var(--g200)",transition:"all .25s",cursor:"pointer"}}
                  onClick={()=>{
                    if(onProductClick) {
                      const normalized = {
                        ...p,
                        location: p.location || (biz?.location) || "Lagos",
                        storeId: p.storeId || (biz?.id) || 1,
                        store: p.store || (biz?.name) || name,
                        vendorPhone: p.vendorPhone || phone || "",
                        rating: p.rating || 4.8,
                        reviews: p.reviews || 0,
                        sponsored: p.sponsored || false,
                        verified: p.verified || false,
                      };
                      onProductClick(normalized);
                    }
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(6,13,31,.1)";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
                  <div data-card-image style={{position:"relative",aspectRatio:"1/1",overflow:"hidden",background:"var(--g100)"}}>
                    <img src={p.img} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover",transition:"transform .4s"}}
                      onMouseEnter={e=>e.currentTarget.style.transform="scale(1.04)"}
                      onMouseLeave={e=>e.currentTarget.style.transform=""} />
                    <span style={{position:"absolute",top:10,left:10,background:p.type==="physical"?"var(--navy)":p.type==="digital"?"#7c3aed":"#0891b2",color:"#fff",fontSize:".65rem",fontWeight:800,padding:".2rem .55rem",borderRadius:6}}>
                      {p.type==="physical"?"📦 Physical":p.type==="digital"?"💾 Digital":"🔧 Service"}
                    </span>
                  </div>
                  <div data-card-body style={{padding:"1rem"}}>
                    <h4 style={{fontWeight:700,fontSize:".9rem",margin:"0 0 .35rem",lineHeight:1.3}}>{p.name}</h4>
                    <p style={{fontSize:".75rem",color:"var(--muted)",marginBottom:".75rem",lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{p.desc}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontFamily:"Syne",fontWeight:800,fontSize:"1rem",color:"var(--navy)"}}>{fmt(p.price)}</span>
                      {hasWa ? (
                        <a href={buildWhatsAppHref(waNum, `Hi, I'm interested in ${p.name} from your LBC store. Is it available?`)}
                          target={window.innerWidth <= 768 ? "_self" : "_blank"} rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                          style={{background:"#25D366",color:"#fff",borderRadius:7,padding:".38rem .8rem",fontSize:".72rem",fontWeight:700,textDecoration:"none",display:"flex",alignItems:"center",gap:".3rem",flexShrink:0}}>
                          💬 Order
                        </a>
                      ) : (
                        <span title="WhatsApp unavailable" style={{background:"var(--g100)",color:"var(--muted)",borderRadius:7,padding:".38rem .8rem",fontSize:".72rem",fontWeight:700,cursor:"not-allowed"}}>
                          💬 —
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{padding:"4rem",textAlign:"center",color:"var(--muted)",background:"#fff",borderRadius:16,border:"1px solid var(--g200)"}}>
              <div style={{fontSize:"2.5rem",marginBottom:".75rem"}}>📭</div>
              <p style={{fontWeight:600,marginBottom:".25rem"}}>No listings found</p>
              <p style={{fontSize:".85rem"}}>Try changing the filter or search term.</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 60% at 50% 120%,rgba(0,102,255,.2) 0%,transparent 70%)"}} />

      <div style={{position:"relative",zIndex:2,maxWidth:680,margin:"0 auto"}}>

function PageWrap({ children, setPage }) {

        <button onClick={()=>setPage("home")} style={{background:"var(--blue)",color:"#fff",border:"none",padding:".75rem 2rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:"pointer"}}>← Back to LBC</button>

}

function InfoCard({ icon, title, body }) {

    <div style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:16,padding:"1.75rem",display:"flex",flexDirection:"column",gap:".75rem"}}>

      <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",color:"var(--navy)",marginBottom:"1.25rem",paddingBottom:".75rem",borderBottom:"2px solid var(--g200)"}}>{title}</h2>
      {children}

}

function AboutPage({ setPage }) {
  const formatAboutStatValue = (value) => {
    const input = String(value ?? "").trim();
    if (!input) return input;

    const hasPlus = input.endsWith("+");
    const numericPortion = hasPlus ? input.slice(0, -1) : input;
    const numericValue = Number(numericPortion.replace(/,/g, ""));

    if (!Number.isFinite(numericValue) || numericValue < 1000) {
      return input;
    }

    const compactThousands = numericValue / 1000;
    const rounded = Number.isInteger(compactThousands)
      ? String(compactThousands)
      : compactThousands.toFixed(1).replace(/\.0$/, "");

    return `${rounded}k${hasPlus ? "+" : ""}`;
  };

  const stats = [
    {n:"12k+",l:"Businesses Listed"},
    {n:"80k+",l:"Products & Services"},
    {n:"200k+",l:"Monthly Shoppers"},
    {n:"40+",l:"Lagos Areas Covered"},
  ];
  const values = [
    {icon:"🏘️",title:"Hyperlocal First",body:"We exist to serve Lagos communities — from Lekki Phase 1 to Ikorodu, Ikeja to Ajah. Every feature we build is designed for the way Lagosians discover, shop and transact."},
    {icon:"🤝",title:"Trust & Verification",body:"Every verified badge on LBC is earned, not bought. We manually review businesses, confirm legitimacy, and give buyers the confidence to transact with local vendors."},
    {icon:"📱",title:"WhatsApp-Native Commerce",body:"Lagosians close deals on WhatsApp. LBC is built around that reality — every listing connects buyers directly to sellers through the platform they already use."},
    {icon:"🚀",title:"Visibility for Everyone",body:"A small business in Sangotedo deserves the same visibility as one on Victoria Island. Our sponsored listing model is affordable and designed for SMEs, not corporates."},
  ];

  return (
    <PageWrap setPage={setPage}>
      <PageHero badge="🏙️ Our Story" title="Built for Lagos. Built for You." subtitle="LBC is Nigeria's hyperlocal visibility engine — connecting buyers to the best businesses, products and services across all of Lagos." />
      <div style={{maxWidth:960,margin:"0 auto",padding:"3rem 1.5rem"}}>

        {/* Mission */}
        <SectionBlock title="Our Mission">
          <div style={{background:"var(--navy)",borderRadius:20,padding:"2.5rem",color:"#fff",position:"relative",overflow:"hidden",marginBottom:"1.5rem"}}>
            <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 60% 80% at 0% 50%,rgba(0,102,255,.2) 0%,transparent 60%)"}} />
            <p style={{position:"relative",zIndex:1,fontSize:"1.2rem",lineHeight:1.8,fontWeight:500,color:"rgba(255,255,255,.85)",maxWidth:"65ch"}}>
              "To make every Lagos business discoverable, every buyer confident, and every transaction seamless — starting in Lekki, growing across all of Lagos."
            </p>
          </div>
          <p style={{fontSize:".95rem",color:"var(--g700)",lineHeight:1.8}}>
            Lagos is Africa's commercial capital — home to over 20 million people, tens of thousands of SMEs, and one of the world's most vibrant informal economies. Yet most small businesses remain invisible online, relying entirely on word-of-mouth and social media posts that disappear in hours. LBC changes that. We give every Lagos business a permanent, searchable, WhatsApp-connected presence that puts them in front of local buyers every single day.
          </p>
        </SectionBlock>

        {/* Stats */}
        <SectionBlock title="LBC By the Numbers">
          <div className="about-stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(200px,100%),1fr))",gap:"1.25rem"}}>
            {stats.map(s=>(
              <div key={s.l} className="about-stat-card" style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:16,padding:"1.5rem",textAlign:"center"}}>
                <div className="about-stat-value" style={{fontFamily:"Syne",fontWeight:900,fontSize:"2rem",color:"var(--blue)",marginBottom:".25rem"}}>{formatAboutStatValue(s.n)}</div>
                <div className="about-stat-label" style={{fontSize:".82rem",color:"var(--muted)",fontWeight:600}}>{s.l}</div>
              </div>
            ))}
          </div>
        </SectionBlock>

        {/* Values */}
        <SectionBlock title="What We Stand For">
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(220px,100%),1fr))",gap:"1.25rem"}}>
            {values.map(v=><InfoCard key={v.title} icon={v.icon} title={v.title} body={v.body} />)}
          </div>
        </SectionBlock>

        {/* Story */}
        <SectionBlock title="The Story">
          <div style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:16,padding:"2rem",lineHeight:1.9,color:"var(--g700)",fontSize:".95rem"}}>
            <p style={{marginBottom:"1rem"}}>LBC was born out of a frustration that every Lagos resident knows well — you're looking for a tailor in Lekki Phase 1, a clean mechanic in Chevron, or a trustworthy phone vendor in VI, and your only options are scrolling through hundreds of irrelevant Instagram posts or asking around in WhatsApp groups.</p>
            <p style={{marginBottom:"1rem"}}>We started in 2024 with a simple idea: build the local business directory that Lagos actually deserves. One that's mobile-first, WhatsApp-integrated, and built around how Lagosians actually discover and transact with businesses.</p>
            <p>Today, LBC covers 40+ areas across Lagos — from Badagry to Epe, Ikorodu to Apapa — with thousands of verified listings, real product photos, and direct WhatsApp connections. We're just getting started.</p>
          </div>
        </SectionBlock>

        {/* CTA */}
        <div style={{background:"var(--navy)",borderRadius:20,padding:"2.5rem",textAlign:"center"}}>
          <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.5rem",color:"#fff",marginBottom:".75rem"}}>Ready to list your business?</h2>
          <p style={{color:"rgba(255,255,255,.5)",fontSize:".9rem",marginBottom:"1.5rem"}}>Join thousands of Lagos businesses already on LBC.</p>
          <button onClick={()=>setPage("onboarding")} style={{background:"var(--amber)",color:"#7c3e00",border:"none",padding:".875rem 2.5rem",borderRadius:10,fontWeight:800,fontSize:".95rem",cursor:"pointer"}}>⚡ List Your Business →</button>
        </div>
      </div>
    </PageWrap>
  );
}

// ── 6. CONTACT US ──
// ════════════════════════════════════════════════════════════
function ContactPage({ setPage }) {
  const [form, setForm] = useState({name:"",email:"",subject:"",message:""});
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const submit = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    try {
      await api.submitContact({
        name: form.name,
        email: form.email,
        subject: form.subject,
        message: form.message,
      });
      setSent(true);
    } catch (err) {
      setError(err.message || "Failed to send message.");
    } finally {
      setLoading(false);
    }
  };
  const channels = [
    {icon:"📧",title:"Email Support",val:"support@lbc.ng",sub:"Response within 24 hours"},
    {icon:"💬",title:"WhatsApp Support",val:"+234 800 LBC HELP",sub:"Mon–Fri, 9am–6pm"},
    {icon:"🐦",title:"Twitter / X",val:"@LBCNigeria",sub:"For quick updates and announcements"},
    {icon:"📍",title:"Office",val:"Lekki Phase 1, Lagos",sub:"By appointment only"},
  ];
  return (
    <PageWrap setPage={setPage}>
      <PageHero badge="📬 Get in Touch" title="Contact LBC" subtitle="Have a question, issue, or partnership proposal? We'd love to hear from you." />
      <div className="fp-2col" style={{maxWidth:960,margin:"0 auto",padding:"3rem 1.5rem",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2.5rem",alignItems:"start"}}>
        {/* Form */}
        <div>
          <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.3rem",marginBottom:"1.5rem"}}>Send a Message</h2>
          {sent ? (
            <div style={{background:"rgba(34,197,94,.08)",border:"1.5px solid rgba(34,197,94,.3)",borderRadius:16,padding:"2.5rem",textAlign:"center"}}>
              <div style={{fontSize:"3rem",marginBottom:".75rem"}}>✅</div>
              <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.1rem",color:"var(--navy)",marginBottom:".5rem"}}>Message Sent!</h3>
              <p style={{fontSize:".875rem",color:"var(--muted)"}}>We'll get back to you at {form.email} within 24 hours.</p>
            </div>
          ) : (
            <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
              {[["Full Name","name","text","e.g. Amaka Obi"],["Email Address","email","email","you@example.com"],["Subject","subject","text","e.g. Issue with my listing"]].map(([label,key,type,ph])=>(
                <div key={key}>
                  <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>{label}</label>
                  <input type={type} value={form[key]} onChange={e=>upd(key,e.target.value)} placeholder={ph}
                    style={{width:"100%",padding:".75rem 1rem",borderRadius:9,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}}
                    onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
                </div>
              ))}
              <div>
                <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Message</label>
                <textarea value={form.message} onChange={e=>upd("message",e.target.value)} rows={5} placeholder="Tell us what's on your mind…"
                  style={{width:"100%",padding:".75rem 1rem",borderRadius:9,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",resize:"vertical",lineHeight:1.6}}
                  onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
              </div>
              <button type="submit" disabled={loading||!form.name||!form.email||!form.message}
                style={{background:loading||!form.name||!form.email||!form.message?"var(--g300)":"var(--blue)",color:loading||!form.name||!form.email||!form.message?"var(--muted)":"#fff",border:"none",padding:".875rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem"}}>
                {loading?<><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> Sending…</>:"Send Message →"}

// ── 7. REPORT A BUSINESS ──
// ════════════════════════════════════════════════════════════
function ReportPage({ setPage }) {
  const [form, setForm] = useState({business:"",reason:"",details:"",email:""});
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const reasons = ["Fraudulent or scam activity","Counterfeit or fake products","Misleading product descriptions","Unresponsive vendor after payment","Inappropriate content","Other"];
  const submit = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    try {
      await api.submitReport({
        storeName: form.business,
        reason: form.reason,
        details: form.details,
        reporterEmail: form.email || null,
      });
      setSent(true);
    } catch (err) {
      setError(err.message || "Failed to submit report.");
    } finally {
      setLoading(false);
    }
  };
  return (
    <PageWrap setPage={setPage}>
      <PageHero badge="🚨 Safety" title="Report a Business" subtitle="Help us keep LBC safe and trustworthy for all Lagos buyers. All reports are reviewed within 24 hours." />
      <div style={{maxWidth:640,margin:"0 auto",padding:"3rem 1.5rem"}}>
        <div style={{background:"rgba(239,68,68,.06)",border:"1.5px solid rgba(239,68,68,.2)",borderRadius:14,padding:"1.1rem 1.25rem",marginBottom:"2rem",display:"flex",gap:".75rem",alignItems:"flex-start"}}>
          <span style={{fontSize:"1.2rem",flexShrink:0}}>⚠️</span>
          <p style={{fontSize:".85rem",color:"var(--g700)",lineHeight:1.7}}>If you believe you are a victim of fraud, please also report to the <strong>EFCC</strong> (efccnigeria.org) or the <strong>Nigerian Police</strong>. LBC reports are for platform moderation only.</p>
        </div>
        {sent ? (
          <div style={{background:"rgba(34,197,94,.08)",border:"1.5px solid rgba(34,197,94,.3)",borderRadius:16,padding:"2.5rem",textAlign:"center"}}>
            <div style={{fontSize:"3rem",marginBottom:".75rem"}}>✅</div>
            <h3 style={{fontFamily:"Syne",fontWeight:800,color:"var(--navy)",marginBottom:".5rem"}}>Report Submitted</h3>
            <p style={{fontSize:".875rem",color:"var(--muted)"}}>Our Trust & Safety team will review this within 24 hours. Thank you for helping keep LBC safe.</p>
          </div>
        ) : (
          <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:"1.25rem",background:"#fff",border:"1px solid var(--g200)",borderRadius:18,padding:"2rem"}}>
            <div>
              <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Business Name or URL *</label>
              <input value={form.business} onChange={e=>upd("business",e.target.value)} placeholder="e.g. Fake Gadgets NG" style={{width:"100%",padding:".75rem 1rem",borderRadius:9,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}} onFocus={e=>e.target.style.borderColor="var(--red)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
            </div>
            <div>
              <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Reason for Report *</label>
              <select value={form.reason} onChange={e=>upd("reason",e.target.value)} style={{width:"100%",padding:".75rem 1rem",borderRadius:9,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",color:"var(--text)"}}>
                <option value="">Select a reason…</option>
                {reasons.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <div>
              <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Details *</label>
              <textarea value={form.details} onChange={e=>upd("details",e.target.value)} rows={5} placeholder="Describe what happened in as much detail as possible. Include dates, amounts, and any screenshots you have."
                style={{width:"100%",padding:".75rem 1rem",borderRadius:9,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",resize:"vertical",lineHeight:1.6}} />
            </div>
            <div>
              <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Your Email (optional)</label>
              <input type="email" value={form.email} onChange={e=>upd("email",e.target.value)} placeholder="So we can follow up with you" style={{width:"100%",padding:".75rem 1rem",borderRadius:9,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}} />
            </div>
            <button type="submit" disabled={loading||!form.business||!form.reason||!form.details}
              style={{background:loading||!form.business||!form.reason||!form.details?"var(--g300)":"var(--red)",color:"#fff",border:"none",padding:".875rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem"}}>
              {loading?<><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> Submitting…</>:"Submit Report →"}
            </button>
            {error && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:".7rem 1rem",color:"var(--red)",fontSize:".82rem",fontWeight:600}}>⚠️ {error}</div>}
          </form>
        )}
      </div>
    </PageWrap>
  );
}
