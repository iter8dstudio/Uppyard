<script>
// ── API Configuration (Environment-aware) ───────────────────
// This dynamically determines the API base URL based on hostname
const API_BASE_URL_MAP = {
  'localhost': 'http://localhost:8000/api',
  '127.0.0.1': 'http://localhost:8000/api',
  'lekkibusinessconnect.com': 'https://lbc-production.up.railway.app/api',
  'www.lekkibusinessconnect.com': 'https://lbc-production.up.railway.app/api',
  'lbc.ng': 'https://lbc-production.up.railway.app/api',
  'www.lbc.ng': 'https://lbc-production.up.railway.app/api',
  'testlbc-production.up.railway.app': 'https://lbc-production.up.railway.app/api',
  'lbc-production.up.railway.app': 'https://lbc-production.up.railway.app/api',
};

const DEFAULT_REMOTE_API_BASE_URL = 'https://lbc-production.up.railway.app/api';
const API_BASE_STORAGE_KEY = 'lbc.api.base.v3';
const WISHLIST_CACHE_KEY = 'lbc.wishlist.ids.v1';

const normalizeApiBase = (value = '') => String(value || '').trim().replace(/\/$/, '');

const buildApiBaseCandidates = () => {
  const hostname = window.location.hostname;
  const configured = normalizeApiBase(window.__LBC_API_BASE_URL);
  const saved = normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY));
  const preferred = normalizeApiBase(API_BASE_URL_MAP[hostname]);
  const currentOriginApi = hostname === 'localhost' || hostname === '127.0.0.1'
    ? ''
    : normalizeApiBase(`${window.location.origin}/api`);

  return Array.from(new Set([
    configured,
    saved,
    preferred,
    currentOriginApi,
    hostname === 'localhost' || hostname === '127.0.0.1' ? 'http://localhost:8000/api' : '',
    DEFAULT_REMOTE_API_BASE_URL,
    'https://lbc-production.up.railway.app/api',
    'https://api.lbc.ng/api',
  ].filter(Boolean)));
};

const API_BASE_CANDIDATES = buildApiBaseCandidates();
const determineApiUrl = () => API_BASE_CANDIDATES[0] || DEFAULT_REMOTE_API_BASE_URL;

const API_CONFIG = {
  dev: { API_BASE_URL: determineApiUrl() },
  prod: { API_BASE_URL: determineApiUrl() }
};

const ENV = window.location.hostname === 'localhost' ? 'dev' : 'prod';
const API = API_CONFIG[ENV];
const MARKETPLACE_CACHE_KEY = 'lbc.marketplace.cache.v2';
const MARKETPLACE_CACHE_TTL = 5 * 60 * 1000;

const getCollection = (payload, key) => {
  if (Array.isArray(payload)) return payload;
  if (Array.isArray(payload?.[key])) return payload[key];
  return [];
};

const readMarketplaceCache = () => {
  try {
    const raw = localStorage.getItem(MARKETPLACE_CACHE_KEY);
    if (!raw) return null;

    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.products) || !Array.isArray(parsed.businesses)) {
      return null;
    }

    if (Date.now() - Number(parsed.timestamp || 0) > MARKETPLACE_CACHE_TTL) {
      return null;
    }

    return parsed;
  } catch {
    return null;
  }
};

const writeMarketplaceCache = (products, businesses) => {
  try {
    localStorage.setItem(MARKETPLACE_CACHE_KEY, JSON.stringify({
      products,
      businesses,
      timestamp: Date.now(),
    }));
  } catch {
    // Ignore storage failures.
  }
};

const readWishlistCache = () => {
  try {
    const raw = localStorage.getItem(WISHLIST_CACHE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
  } catch {
    return [];
  }
};

const writeWishlistCache = (wishlistIds = []) => {
  try {
    const uniqueIds = Array.from(new Set((wishlistIds || []).filter(Boolean)));
    localStorage.setItem(WISHLIST_CACHE_KEY, JSON.stringify(uniqueIds));
  } catch {
    // Ignore storage failures.
  }
};
</script>

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// Global fetch guard: if a navigation/request for an HTML route returns 404,
// show a small toast message then redirect to home. This avoids intrusive
// `alert()` calls while still informing the user and protecting the SPA.
(() => {
  // Simple toast helper
  function showToast(message = '', duration = 2200) {
    try {
      let container = document.getElementById('lbc-toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'lbc-toast-container';
        container.style.position = 'fixed';
        container.style.left = '50%';
        container.style.bottom = '24px';
        container.style.transform = 'translateX(-50%) translateY(12px)';
        container.style.padding = '10px 14px';
        container.style.background = 'rgba(17,24,39,0.95)';
        container.style.color = '#fff';
        container.style.borderRadius = '10px';
        container.style.boxShadow = '0 8px 24px rgba(2,6,23,0.35)';
        container.style.fontSize = '0.95rem';
        container.style.fontWeight = '600';
        container.style.zIndex = 99999;
        container.style.transition = 'opacity .28s ease, transform .28s ease';
        container.style.opacity = '0';
        container.style.pointerEvents = 'none';
        document.body.appendChild(container);
      }
      container.textContent = message;
      // show
      requestAnimationFrame(() => {
        container.style.opacity = '1';
        container.style.transform = 'translateX(-50%) translateY(0)';
      });
      // hide after duration
      setTimeout(() => {
        container.style.opacity = '0';
        container.style.transform = 'translateX(-50%) translateY(12px)';
      }, duration);
    } catch (e) {
      // ignore toast failures
    }
  }

  const _fetch = window.fetch.bind(window);
  window.fetch = async (...args) => {
    try {
      const res = await _fetch(...args);
      try {
        if (res && res.status === 404) {
          const ct = (res.headers && res.headers.get && (res.headers.get('content-type') || '')) || '';
          const url = (res.url && (new URL(res.url, window.location.href).pathname)) || '';
          const isHtml = ct.includes('text/html');
          const isCurrentPath = url === window.location.pathname;
          if (isHtml || isCurrentPath) {
            showToast('Page not found — redirecting to home.');
            setTimeout(() => { try { window.location.href = '/'; } catch (e) {} }, 1600);
          }
        }
      } catch (e) {
        // swallow header/read errors
      }
      return res;
    } catch (err) {
      throw err;
    }
  };
})();

class ApiService {
  constructor() {
    this.baseCandidates = API_BASE_CANDIDATES.length ? API_BASE_CANDIDATES : [API.API_BASE_URL];
    this.baseURL = this.baseCandidates[0] || API.API_BASE_URL;
    this.accessToken = localStorage.getItem('accessToken') || null;
    this.refreshToken = localStorage.getItem('refreshToken') || null;
  }

  setBaseURL(nextBase) {
    const normalized = normalizeApiBase(nextBase);
    if (!normalized) return;
    this.baseURL = normalized;
    try {
      localStorage.setItem(API_BASE_STORAGE_KEY, normalized);
    } catch {
      // Ignore storage failures.
    }
  }

  setTokens(accessToken, refreshToken) {
    this.accessToken = accessToken || null;
    this.refreshToken = refreshToken || null;

    if (accessToken) localStorage.setItem('accessToken', accessToken);
    else localStorage.removeItem('accessToken');

    if (refreshToken) localStorage.setItem('refreshToken', refreshToken);
    else localStorage.removeItem('refreshToken');
  }

  clearTokens() {
    this.accessToken = null;
    this.refreshToken = null;
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
  }

  async request(endpoint, options = {}, retry = true, candidateIndex = 0) {
    const candidateBase = this.baseCandidates[candidateIndex] || this.baseURL;
    const url = `${candidateBase}${endpoint}`;
    const headers = { ...(options.headers || {}) };
    const isFormData = options.body instanceof FormData;

    if (!isFormData && !headers['Content-Type']) {
      headers['Content-Type'] = 'application/json';
    }

    if (this.accessToken && !headers.Authorization) {
      headers.Authorization = `Bearer ${this.accessToken}`;
    }

    let response;
    try {
      response = await fetch(url, { ...options, headers });
    } catch (error) {
      const hasFallback = candidateIndex + 1 < this.baseCandidates.length;
      const isNetworkError = /failed to fetch|networkerror|load failed/i.test(String(error?.message || ''));

      if (hasFallback && isNetworkError) {
        return this.request(endpoint, options, retry, candidateIndex + 1);
      }

      throw error;
    }

    if (candidateBase !== this.baseURL && response.ok) {
      this.setBaseURL(candidateBase);
    }

    const text = await response.text();
    const data = text ? (() => {
      try { return JSON.parse(text); } catch { return { message: text }; }
    })() : {};

    if (response.status === 401 && retry && this.refreshToken) {
      const refreshed = await this.refresh();
      if (refreshed?.accessToken) {
        return this.request(endpoint, options, false);
      }
    }

    if (!response.ok) {
      const detailMessage = data.details && Array.isArray(data.details)
        ? data.details.map(d => `${d.path}: ${d.message}`).join('; ')
        : null;
      throw new Error(detailMessage ? `${data.error || data.message}: ${detailMessage}` : data.error || data.message || `Request failed (${response.status})`);
    }

    return data;
  }

  async register(payload) {

    });
  }

  async login(email, password) {
    const data = await this.request('/auth/login', {

  async refresh() {

    try {
      const data = await this.request('/auth/refresh', {
        method: 'POST',
        headers: { Authorization: undefined },
        body: JSON.stringify({ refreshToken: this.refreshToken }),

      this.setTokens(data.accessToken, data.refreshToken);

const sanitizePhoneNumber = (value = "") => String(value || "").replace(/[^\d]/g, "");
const toInternationalPhone = (value = "") => {
  const sanitized = sanitizePhoneNumber(value);
  if (!sanitized) return "";
  if (sanitized.startsWith("234")) return sanitized;
  if (sanitized.startsWith("00")) return sanitized.slice(2);
  if (sanitized.startsWith("0")) return `234${sanitized.slice(1)}`;
  return sanitized;
};
const buildWhatsAppHref = (value, message = "") => {
  const phone = toInternationalPhone(value);
  if (!phone) return "#";
  const encodedMessage = message ? encodeURIComponent(message) : "";
  return `https://api.whatsapp.com/send?phone=${phone}${encodedMessage ? `&text=${encodedMessage}` : ""}`;
};

const PAYSTACK_PENDING_STORAGE_KEY = 'lbc.paystack.pending.v1';
const PAYSTACK_CANCEL_EVENT = 'lbc:paystack-checkout-cancelled';

const hasPaystackReferenceInUrl = (locationLike = window.location) => {
  const params = new URLSearchParams(locationLike.search || '');
  return Boolean(params.get('reference') || params.get('trxref'));
};

const markPendingPaystackCheckout = (context, metadata = {}) => {
  try {
    sessionStorage.setItem(PAYSTACK_PENDING_STORAGE_KEY, JSON.stringify({
      context,
      metadata,
      startedAt: Date.now(),
    }));
  } catch {
    // Ignore storage failures.
  }
};

const readPendingPaystackCheckout = () => {
  try {
    const raw = sessionStorage.getItem(PAYSTACK_PENDING_STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
};

const clearPendingPaystackCheckout = () => {
  try {
    sessionStorage.removeItem(PAYSTACK_PENDING_STORAGE_KEY);
  } catch {
    // Ignore storage failures.
  }
};

const recoverPendingPaystackCheckout = (expectedContext, onCancel) => {
  const pendingCheckout = readPendingPaystackCheckout();
  if (!pendingCheckout || pendingCheckout.context !== expectedContext) return false;
  if (hasPaystackReferenceInUrl()) return false;

  clearPendingPaystackCheckout();

  try {
    window.dispatchEvent(new CustomEvent(PAYSTACK_CANCEL_EVENT, {
      detail: {
        context: expectedContext,
        ...(pendingCheckout.metadata || {}),
      },
    }));
  } catch {
    // Ignore event dispatch issues.
  }

  onCancel?.(pendingCheckout);
  return true;
};

const normalizeListing = (listing, storesById = new Map()) => {
  if (!listing) return null;
  if (listing.name && listing.id && listing.storeId) return listing;

  const storeFromMap = storesById.get(listing.storeId);
  const storeFromPayload = listing.store
    ? {
        id: listing.storeId,
        name: listing.store.bizName,
        category: listing.store.category || listing.category,
        location: listing.store.location,
        phoneVerified: !!(listing.store.phoneVerified ?? listing.store.verified),
        verified: listing.store.verified,
        sponsored: !!listing.store.sponsored,
        whatsapp: listing.store.whatsapp || "",
        bizPhone: listing.store.bizPhone || "",
        bizEmail: listing.store.bizEmail || "",
        logo: listing.store.logo || "",
        banner: listing.store.banner || "",
        img: listing.store.banner || listing.store.logo || "",
        createdAt: listing.store.createdAt || null,
      }
    : null;

  const resolvedStore = storeFromMap || storeFromPayload;
  const image = listing.mainImage || (Array.isArray(listing.images) ? listing.images[0] : "") || "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop";

  return {
    id: listing.id,
    name: listing.title || "Untitled listing",
    price: Number(listing.price || 0),
    store: resolvedStore?.name || "Store",
    storeId: listing.storeId,
    location: listing.location || resolvedStore?.location || "Lagos",
    category: listing.category || "all",
    sponsored: !!listing.sponsored,
    verified: !!resolvedStore?.verified,
    rating: Number(listing.rating || 4.5),
    reviews: Number(listing.reviews || 0),
    vendorPhone: resolvedStore?.bizPhone || "",
    img: image,
    mainImage: listing.mainImage || image,
    images: Array.isArray(listing.images) ? listing.images : [],
    type: listing.type || "physical",
    desc: listing.description || "",
    status: listing.status,
  };
};

const slugifyRoutePart = (value = "") => {
  const slug = String(value || "")
    .toLowerCase()
    .trim()
    .replace(/[’']/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");

  return slug || "page";
};

const buildAppUrl = (page, options = {}) => {
  const normalizedPage = page === "boosts" ? "dashboard" : (page || "home");
  const params = new URLSearchParams();

  if (normalizedPage === "search") {
    if (options.searchQ) params.set("q", options.searchQ);
    if (options.activeCategory && options.activeCategory !== "all") {
      params.set("category", options.activeCategory);
    }
  }

  if (normalizedPage === "product") {
    const product = options.product || null;
    const slug = product ? slugifyRoutePart(product.name) : "listing";
    if (product?.id != null) params.set("id", String(product.id));
    if (options.searchQ) params.set("q", options.searchQ);
    if (options.activeCategory && options.activeCategory !== "all") {
      params.set("category", options.activeCategory);
    }
    return `/listing/${slug}${params.toString() ? `?${params.toString()}` : ""}`;
  }

  if (normalizedPage === "storefront") {
    const biz = options.biz || null;
    const slug = biz?.slug || slugifyRoutePart(biz?.name || "store");
    if (biz?.id != null) {
      return `/store/${encodeURIComponent(String(biz.id))}/${slug}${params.toString() ? `?${params.toString()}` : ""}`;
    }
    return `/store${params.toString() ? `?${params.toString()}` : ""}`;
  }

  const pathname = PAGE_PATHS[normalizedPage] || "/";
  return `${pathname}${params.toString() ? `?${params.toString()}` : ""}`;
};

const resolveAppRoute = (locationLike = window.location) => {
  const pathname = locationLike.pathname || "/";
  const cleanPath = pathname === "/" ? "/" : pathname.replace(/\/+$/, "");
  const params = new URLSearchParams(locationLike.search || "");
  const sharedState = {
    searchQ: params.get("q") || "",
    activeCategory: params.get("category") || "all",
  };

  if (cleanPath === PAGE_PATHS.boostCallback) {
    return { page: "boostCallback", ...sharedState };
  }

  if (cleanPath === PAGE_PATHS.product || cleanPath.startsWith("/listing/")) {
    return {
      page: "product",
      productId: params.get("id") || "",
      productSlug: decodeURIComponent(cleanPath.split("/")[2] || ""),
      ...sharedState,
    };
  }

  if (cleanPath === PAGE_PATHS.storefront || cleanPath.startsWith("/store/")) {
    const storePathParts = cleanPath.split("/").filter(Boolean);
    const pathStoreId = storePathParts.length >= 3 ? storePathParts[1] : "";
    const pathStoreSlug = storePathParts.length >= 3 ? storePathParts.slice(2).join("/") : (storePathParts[1] || "");
    return {
      page: "storefront",
      businessId: params.get("id") || pathStoreId || "",
      businessSlug: decodeURIComponent(pathStoreSlug || ""),
      ...sharedState,
    };
  }

  const matchedPage = Object.entries(PAGE_PATHS).find(([, route]) => route === cleanPath)?.[0] || "home";
  return { page: matchedPage, ...sharedState };
};

const findByRouteMatch = (items = [], { id = "", slug = "", nameKey = "name", slugKey = "slug" } = {}) => (
  items.find((item) => {
    if (!item) return false;
    if (id && String(item.id) === String(id)) return true;
    if (slug) {
      const itemSlug = item?.[slugKey] || slugifyRoutePart(item?.[nameKey] || "");
      return itemSlug === slug;
    }
    return false;
  }) || null
);

// ── SEARCH PAGE ──
function SearchPage({ searchQ, activeCategory, setSelectedProduct, setSelectedBusiness, wishlist, toggleWish, products = [], businesses = [] }) {
  const [priceMin,setPriceMin] = useState("");
  const [priceMax,setPriceMax] = useState("");
  const [location,setLocation] = useState("all");
  const [typeFilter,setTypeFilter] = useState("all");
  const [ratingFilter,setRatingFilter] = useState(0);
  const [sponsoredOnly,setSponsoredOnly] = useState(false);
  const [tab,setTab] = useState("products");
  const [sort,setSort] = useState("relevance");
  const [showMobileFilters,setShowMobileFilters] = useState(false);
  const isMobile = useIsMobile(500);

  const activeFilterCount = [
    priceMin !== "",
    priceMax !== "",
    location !== "all",
    typeFilter !== "all",
    ratingFilter > 0,
    sponsoredOnly,
  ].filter(Boolean).length;

  const resetFilters = () => {
    setPriceMin("");
    setPriceMax("");
    setLocation("all");
    setTypeFilter("all");
    setRatingFilter(0);
    setSponsoredOnly(false);
    setShowMobileFilters(false);
  };

  useEffect(() => {
    if (!isMobile || !showMobileFilters) return undefined;
    const previousOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => {
      document.body.style.overflow = previousOverflow;
    };
  }, [isMobile, showMobileFilters]);

  useEffect(() => {
    if (!isMobile) {
      setShowMobileFilters(false);
    }
  }, [isMobile]);

  const filteredProducts = products.filter(p=>{
    const q=searchQ.toLowerCase();
    const matchQ=!q||p.name.toLowerCase().includes(q)||p.store.toLowerCase().includes(q)||p.category.includes(q);
    const matchCat=activeCategory==="all"||p.category===activeCategory;
    const matchLoc=location==="all"||p.location.toLowerCase().includes(location.toLowerCase());
    const matchType=typeFilter==="all"||p.type===typeFilter;
    const matchRating=p.rating>=ratingFilter;
    const matchSponsored=!sponsoredOnly||p.sponsored;
    const matchMin=!priceMin||p.price>=parseInt(priceMin);
    const matchMax=!priceMax||p.price<=parseInt(priceMax);
    return matchQ&&matchCat&&matchLoc&&matchType&&matchRating&&matchSponsored&&matchMin&&matchMax;
  }).sort((a,b)=>{
    if(sort==="price-asc") return a.price-b.price;
    if(sort==="price-desc") return b.price-a.price;
    if(sort==="rating") return b.rating-a.rating;
    return (b.sponsored?1:0)-(a.sponsored?1:0);
  });

  const filteredBiz = businesses.filter(b=>{
    const q=searchQ.toLowerCase();
    const matchQ=!q||b.name.toLowerCase().includes(q)||b.category.includes(q);
    const matchCat=activeCategory==="all"||b.category===activeCategory;
    const matchLoc=location==="all"||b.location.toLowerCase().includes(location.toLowerCase());
    return matchQ&&matchCat&&matchLoc;
  });

  const resultsSummary = `${filteredProducts.length} products · ${filteredBiz.length} businesses`;

  return (
    <div className="search-layout" style={{maxWidth:1280,margin:"0 auto",padding:"clamp(.75rem,3.5vw,1.25rem)",display:"grid",gridTemplateColumns:"minmax(14rem,20%) minmax(0,1fr)",gap:"clamp(.9rem,2.5vw,2rem)",alignItems:"start"}}>
      <aside className="search-filters-column" style={{background:"#fff",borderRadius:"var(--r)",border:"1px solid var(--g200)",padding:"1.2rem",position:"sticky",top:140,animation:"fadeIn .4s ease both"}}>
        <div style={{fontFamily:"Syne",fontWeight:700,fontSize:"1rem",marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          Filters
          <button onClick={resetFilters} style={{background:"none",border:"none",color:"var(--blue)",fontSize:".78rem",fontWeight:600,cursor:"pointer"}}>Clear all</button>
        </div>

        <div style={{borderTop:"1px solid var(--g200)",paddingTop:"1rem",marginBottom:"1rem"}}>
          <div style={{fontWeight:700,fontSize:".82rem",marginBottom:".6rem"}}>Location</div>
          <select value={location} onChange={e=>setLocation(e.target.value)} style={{width:"100%",padding:".6rem .75rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".85rem",outline:"none",color:"var(--text)"}}>
            <option value="all">All Areas</option>
            {LOCATIONS.map(l=><option key={l}>{l}</option>)}
          </select>
        </div>

        <div style={{borderTop:"1px solid var(--g200)",paddingTop:"1rem",marginBottom:"1rem"}}>
          <div style={{fontWeight:700,fontSize:".82rem",marginBottom:".6rem"}}>Price Range (₦)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".5rem",width:"100%"}}>
            <input value={priceMin} onChange={e=>setPriceMin(e.target.value)} placeholder="Min" type="number" style={{width:"100%",minWidth:0,padding:".6rem .5rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".85rem",outline:"none"}} />
            <input value={priceMax} onChange={e=>setPriceMax(e.target.value)} placeholder="Max" type="number" style={{width:"100%",minWidth:0,padding:".6rem .5rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".85rem",outline:"none"}} />
          </div>
        </div>

        <div style={{borderTop:"1px solid var(--g200)",paddingTop:"1rem",marginBottom:"1rem"}}>

        </div>

      <div className="search-results-pane">

// ── AUTH ──
function AuthPage({ setPage, setUser }) {
  const [mode, setMode] = useState("signin");
  const [form, setForm] = useState({name:"",email:"",password:"",confirm:""});
  const [passwordVisibility, setPasswordVisibility] = useState({ password:false, confirm:false });
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [verifyUserId, setVerifyUserId] = useState("");
  // email verify step
  const [verifyStep, setVerifyStep] = useState(false); // show OTP screen after signup
  const [otp, setOtp] = useState(["","","","","",""]);
  const [otpError, setOtpError] = useState("");
  const [otpLoading, setOtpLoading] = useState(false);
  const [resendCount, setResendCount] = useState(0);
  const [resendCooldown, setResendCooldown] = useState(0);
  const otpRef0=useRef(),otpRef1=useRef(),otpRef2=useRef(),otpRef3=useRef(),otpRef4=useRef(),otpRef5=useRef();
  const otpRefs = [otpRef0,otpRef1,otpRef2,otpRef3,otpRef4,otpRef5];

  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  // OTP input handler — auto-advance, handle backspace
  const handleOtpKey = (i, e) => {
    if (e.key === "Backspace") {
      const next = [...otp]; next[i] = "";
      setOtp(next);
      if (i > 0) otpRefs[i-1].current?.focus();
      return;
    }
    if (!/^[0-9]$/.test(e.key)) return;
    const next = [...otp]; next[i] = e.key;
    setOtp(next);
    if (i < 5) otpRefs[i+1].current?.focus();
  };

  const startResendCooldown = () => {
    setResendCooldown(30);
    const t = setInterval(() => {
      setResendCooldown(c => { if(c<=1){clearInterval(t);return 0;} return c-1; });
    }, 1000);
  };

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!form.email || !form.password) return setError("Please fill in all fields.");
    if (mode === "signup") {
      if (!form.name) return setError("Name is required.");
      if (form.password !== form.confirm) return setError("Passwords don't match.");
      if (form.password.length < 6) return setError("Password must be at least 6 characters.");
    }

    setLoading(true);

    try {
      if (mode === "signup") {
        const registered = await api.register({
          name: form.name,
          email: form.email,
          password: form.password,
        });

        setVerifyUserId(registered.userId || "");
        setVerifyStep(true);
        setOtp(["","","","","",""]);
        setOtpError("");
        startResendCooldown();
      } else {
        const session = await api.login(form.email, form.password);
        setUser({
          ...(session.user || {}),
          accessToken: session.accessToken,
          refreshToken: session.refreshToken,
        });
        setPage("home");
      }
    } catch (err) {
      setError(err.message || "Authentication failed.");
    } finally {
      setLoading(false);
    }
  };

  const submitOtp = async () => {
    setOtpError("");
    const entered = otp.join("");
    if (entered.length < 6) return setOtpError("Please enter all 6 digits.");
    if (!verifyUserId) return setOtpError("Missing verification session. Please sign up again.");

    setOtpLoading(true);

    try {
      const verified = await api.verifyEmail(verifyUserId, entered);
      setUser({
        ...(verified.user || {}),
        accessToken: verified.accessToken,
        refreshToken: verified.refreshToken,
      });
      setPage("home");
    } catch (err) {
      setOtpError(err.message || "Verification failed.");
      setOtp(["","","","","",""]);
      otpRefs[0].current?.focus();
    } finally {
      setOtpLoading(false);
    }
  };

  const resendOtp = async () => {
    if (resendCooldown > 0) return;
    if (!verifyUserId) {
      setOtpError("Missing verification session. Please sign up again.");
      return;
    }

    setOtpError("");
    setOtpLoading(true);
    try {
      await api.resendOtp(verifyUserId);
      setResendCount(c => c + 1);
      setOtp(["","","","","",""]);
      startResendCooldown();
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    } catch (err) {
      setOtpError(err.message || "Failed to resend code.");
    } finally {
      setOtpLoading(false);
    }
  };

  const inp = (label, key, type="text", placeholder="") => {
    const isPasswordField = type === "password";
    const inputType = isPasswordField && passwordVisibility[key] ? "text" : type;

    return (
      <div>
        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>{label}</label>
        <div style={{position:"relative"}}>
          <input type={inputType} value={form[key]} onChange={e=>upd(key,e.target.value)} placeholder={placeholder}
            style={{width:"100%",padding:isPasswordField?".75rem 2.75rem .75rem 1rem":".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}}
            onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
          {isPasswordField && (
            <button
              type="button"
              onClick={()=>setPasswordVisibility(v=>({ ...v, [key]: !v[key] }))}
              aria-label={passwordVisibility[key] ? "Hide password" : "Show password"}
              style={{position:"absolute",right:".75rem",top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",color:"var(--muted)",cursor:"pointer",fontSize:".95rem",padding:0,lineHeight:1}}
            >
              {passwordVisibility[key] ? "🙈" : "👁"}
            </button>
          )}
        </div>
      </div>
    );
  };

  // ── EMAIL VERIFY SCREEN ──
  if (verifyStep) return (
    <div style={{minHeight:"calc(100vh - 64px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem",background:"var(--offwhite)"}}>
      <div style={{background:"#fff",borderRadius:20,border:"1px solid var(--g200)",padding:"2rem 1.5rem",width:"100%",maxWidth:420,animation:"scaleIn .35s ease both",boxShadow:"var(--sh)",textAlign:"center"}}>
        <div style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",color:"var(--navy)",marginBottom:"2rem",cursor:"pointer",textAlign:"left"}} onClick={()=>setPage("home")}>LB<span style={{color:"var(--blue)"}}>C</span></div>

        <div style={{width:64,height:64,borderRadius:"50%",background:"rgba(0,102,255,.08)",border:"2px solid rgba(0,102,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2rem",margin:"0 auto 1.25rem"}}>✉️</div>
        <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",marginBottom:".5rem"}}>Check your email</h2>
        <p style={{color:"var(--muted)",fontSize:".85rem",marginBottom:".5rem",lineHeight:1.6}}>
          We sent a 6-digit code to
        </p>
        <p style={{fontWeight:700,color:"var(--navy)",fontSize:".9rem",marginBottom:"2rem"}}>{form.email}</p>

        {/* OTP boxes */}
        <div style={{display:"flex",gap:".6rem",justifyContent:"center",marginBottom:"1.25rem"}}>
          {otp.map((digit, i) => (
            <input
              key={i}
              ref={otpRefs[i]}
              type="text"
              inputMode="numeric"
              maxLength={1}
              value={digit}
              onKeyDown={e => handleOtpKey(i, e)}
              onChange={()=>{}} // controlled via onKeyDown
              className="otp-box"
              style={{
                width:48, height:56, borderRadius:10, border:`2px solid ${digit?"var(--blue)":"var(--g200)"}`,
                textAlign:"center", fontSize:"1.4rem", fontWeight:800, outline:"none",
                background: digit ? "rgba(0,102,255,.04)" : "#fff",
                transition:"border .15s, background .15s"
              }}
            />
          ))}
        </div>

        {otpError && (
          <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:".65rem 1rem",color:"var(--red)",fontSize:".82rem",fontWeight:600,marginBottom:"1rem"}}>
            ⚠️ {otpError}
          </div>
        )}

        <button onClick={submitOtp} disabled={otpLoading || otp.join("").length < 6}
          style={{width:"100%",background:otpLoading||otp.join("").length<6?"var(--g300)":"var(--blue)",color:"#fff",border:"none",padding:".875rem",borderRadius:10,fontWeight:700,fontSize:".95rem",cursor:otpLoading?"default":"pointer",marginBottom:"1.25rem",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem"}}>
          {otpLoading ? <><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> Verifying…</> : "Verify Email →"}
        </button>

        <div style={{fontSize:".82rem",color:"var(--muted)"}}>
          Didn't get it?{" "}
          {resendCooldown > 0
            ? <span style={{color:"var(--muted)"}}>Resend in {resendCooldown}s</span>
            : <button onClick={resendOtp}
                style={{background:"none",border:"none",color:"var(--blue)",fontWeight:700,cursor:"pointer",fontSize:".82rem"}}>
                Resend code{resendCount>0?` (${resendCount+1})` :""}
              </button>
          }
        </div>

        <div style={{marginTop:"1rem"}}>
          <button onClick={()=>{setVerifyStep(false);setVerifyUserId("");setOtp(["","","","","",""]);}}
            style={{background:"none",border:"none",color:"var(--muted)",fontSize:".78rem",cursor:"pointer"}}>
            ← Use a different email
          </button>
        </div>
      </div>
    </div>
  );

  // ── MAIN AUTH SCREEN ──
  return (
    <div style={{minHeight:"calc(100vh - 64px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",background:"var(--offwhite)"}}>
      <div style={{background:"#fff",borderRadius:20,border:"1px solid var(--g200)",padding:"2.5rem",width:"100%",maxWidth:420,animation:"scaleIn .35s ease both",boxShadow:"var(--sh)"}}>
        <div style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",color:"var(--navy)",marginBottom:"2rem",cursor:"pointer"}} onClick={()=>setPage("home")}>LB<span style={{color:"var(--blue)"}}>C</span></div>
        <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.5rem",marginBottom:".5rem"}}>{mode==="signin"?"Welcome back":"Create account"}</h2>
        <p style={{color:"var(--muted)",fontSize:".87rem",marginBottom:"2rem"}}>{mode==="signin"?"Sign in to your LBC account.":"Join millions of Lagos buyers & sellers."}</p>
        <div style={{display:"flex",background:"var(--g100)",borderRadius:10,overflow:"hidden",marginBottom:"2rem"}}>
          {["signin","signup"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,padding:".65rem",border:"none",background:mode===m?"var(--navy)":"transparent",color:mode===m?"#fff":"var(--muted)",fontWeight:700,fontSize:".85rem",cursor:"pointer",transition:"all .2s"}}>
              {m==="signin"?"Sign In":"Sign Up"}
            </button>
          ))}
        </div>
        <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
          {mode==="signup"&&inp("Full Name","name","text","e.g. Amaka Johnson")}
          {inp("Email Address","email","email","you@example.com")}
          {inp("Password","password","password","Min 6 characters")}
          {mode==="signup" && form.password.length > 0 && form.password.length < 6 && (
            <div style={{fontSize:".75rem",color:"var(--red)",fontWeight:600,marginTop:"-.5rem"}}>⚠ Password must be at least 6 characters</div>
          )}
          {mode==="signup"&&inp("Confirm Password","confirm","password","••••••••")}
          {mode==="signup" && form.confirm.length > 0 && (
            form.password === form.confirm
              ? <div style={{fontSize:".75rem",color:"#15803d",fontWeight:600,marginTop:"-.5rem"}}>✓ Passwords match</div>
              : <div style={{fontSize:".75rem",color:"var(--red)",fontWeight:600,marginTop:"-.5rem"}}>⚠ Passwords don't match</div>
          )}
          {error&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:".75rem 1rem",color:"var(--red)",fontSize:".83rem",fontWeight:600}}>⚠️ {error}</div>}
          {(()=>{
            const filled = mode==="signin"
              ? form.email && form.password
              : form.name && form.email && form.password.length>=6 && form.confirm && form.password===form.confirm;
            const isDisabled = loading || !filled;
            return (
              <button type="submit" disabled={isDisabled}
                style={{background:isDisabled?"var(--g300)":"var(--blue)",color:isDisabled?"var(--muted)":"#fff",border:"none",padding:".875rem",borderRadius:10,fontWeight:700,fontSize:".95rem",cursor:isDisabled?"not-allowed":"pointer",marginTop:".5rem",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem",transition:"background .2s, color .2s"}}>
                {loading?<><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> Please wait…</>:mode==="signin"?"Sign In →":"Create Account →"}
              </button>
            );
          })()}
        </form>
        <div style={{marginTop:"1.5rem",textAlign:"center",fontSize:".82rem",color:"var(--muted)"}}>
          {mode==="signin"?"Don't have an account? ":"Already have an account? "}
          <button onClick={()=>{setMode(mode==="signin"?"signup":"signin");setError("");}} style={{background:"none",border:"none",color:"var(--blue)",fontWeight:700,cursor:"pointer"}}>{mode==="signin"?"Sign Up":"Sign In"}</button>
        </div>
        <div style={{marginTop:"1.5rem",paddingTop:"1.5rem",borderTop:"1px solid var(--g200)",textAlign:"center"}}>
          <p style={{fontSize:".8rem",color:"var(--muted)",marginBottom:"1rem"}}>Or continue with</p>
          <div style={{display:"flex",gap:".75rem"}}>
            {["🔵 Google","🔷 Facebook"].map(p=>(
              <button key={p} disabled style={{flex:1,background:"var(--g100)",border:"1px solid var(--g200)",borderRadius:8,padding:".65rem",fontWeight:600,fontSize:".82rem",cursor:"not-allowed",color:"var(--muted)"}}>{p}</button>
            ))}
          </div>
          <p style={{fontSize:".72rem",color:"var(--muted)",marginTop:".6rem"}}>Social login coming soon</p>
        </div>
      </div>
    </div>
  );
}

// ── ONBOARDING ──
function OnboardingPage({ setPage, user, setUser, refreshMarketplace }) {
  const [step,setStep] = useState(1);
  const [biz,setBiz] = useState({name:"",type:"physical",category:"phones-electronics-electricals",location:"Lekki Phase 1",phone:"",email:"",whatsapp:"",desc:"",plan:"monthly"});
  const [listing,setListing] = useState({title:"",price:"",listingType:"physical",listingDesc:""});
  const [listingImageFile, setListingImageFile] = useState(null);
  const [listingImagePreview, setListingImagePreview] = useState(null);
  const [done,setDone] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [planCheckoutLoading, setPlanCheckoutLoading] = useState(false);
  const [submitError, setSubmitError] = useState("");
  const fileInputRef = React.useRef(null);
  const upd = (k,v) => setBiz(b=>({...b,[k]:v}));
  const updL = (k,v) => setListing(l=>({...l,[k]:v}));
  
  const handleListingImageClick = () => {
    if (fileInputRef.current) {
      fileInputRef.current.click();
    }
  };
  
  const handleListingImageSelect = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    
    const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
    const maxSize = 5 * 1024 * 1024;
    
    if (!validTypes.includes(file.type)) {
      alert('Please upload a JPG, PNG, or WEBP image');
      return;
    }
    
    if (file.size > maxSize) {
      alert('File size must be less than 5MB');
      return;
    }
    
    setListingImageFile(file);
    
    const reader = new FileReader();
    reader.onload = (event) => {
      setListingImagePreview(event.target?.result);
    };
    reader.readAsDataURL(file);
  };
  const steps = ["Business Type","Business Info","Listing Details","Choose Plan","Review & Launch"];
  const inp = (label,key,obj,fn,type="text",placeholder="") => (
    <div>
      <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>{label}</label>
      <input type={type} value={obj[key]} onChange={e=>fn(key,e.target.value)} placeholder={placeholder}
        style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}}
        onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
    </div>
  );

  const launchBusiness = async () => {
    setSubmitError("");

    if (!user?.accessToken) {
      setSubmitError("Please sign in first to complete onboarding.");
      return;
    }

    const trimmedBizName = String(biz.name || '').trim();
    const trimmedCategory = String(biz.category || '').trim();
    const trimmedLocation = String(biz.location || '').trim();
    const trimmedPhone = String(biz.phone || '').trim();
    const trimmedEmail = String(biz.email || '').trim();
    const trimmedWhatsapp = String(biz.whatsapp || '').trim();
    const trimmedBizDesc = String(biz.desc || '').trim();
    const trimmedListingTitle = String(listing.title || '').trim();
    const cleanedPrice = String(listing.price || '').replace(/,/g, '').trim();
    const listingPrice = cleanedPrice ? Number(cleanedPrice) : NaN;
    const trimmedListingDesc = String(listing.listingDesc || '').trim();
    const listingTypeValue = String(listing.listingType || biz.type || 'physical').trim().toLowerCase();

    if (!trimmedBizName || !trimmedCategory || !trimmedLocation) {
      setSubmitError("Business name, category, and location are required.");
      return;
    }

    if (trimmedEmail && !/^\S+@\S+\.\S+$/.test(trimmedEmail)) {
      setSubmitError("Please enter a valid business email address or leave it blank.");
      return;
    }

    if ((trimmedListingTitle || cleanedPrice || trimmedListingDesc) && (!trimmedListingTitle || !Number.isFinite(listingPrice) || listingPrice <= 0)) {
      setSubmitError("Please enter a valid title and price for your first listing, or skip the listing step.");
      return;
    }

    setSubmitting(true);
    try {
      api.setTokens(user.accessToken, user.refreshToken);

      try {
        await api.createStore({
          bizName: trimmedBizName,
          category: trimmedCategory,
          location: trimmedLocation,
          ...(trimmedPhone ? { bizPhone: trimmedPhone } : {}),
          ...(trimmedEmail ? { bizEmail: trimmedEmail } : {}),
          ...(trimmedWhatsapp ? { whatsapp: trimmedWhatsapp } : {}),
          ...(trimmedBizDesc ? { bizDesc: trimmedBizDesc } : {}),
        });
      } catch (err) {
        if (!String(err.message || '').toLowerCase().includes('already have a store')) {
          throw err;
        }
      }

      if (trimmedListingTitle && Number.isFinite(listingPrice) && listingPrice > 0) {
        const newListing = await api.createListing({
          title: trimmedListingTitle,
          price: listingPrice,
          type: ['physical', 'digital', 'service'].includes(listingTypeValue) ? listingTypeValue : 'physical',
          category: trimmedCategory,
          location: trimmedLocation,
          ...(trimmedListingDesc ? { description: trimmedListingDesc } : {}),
          status: biz.plan === 'free' ? 'draft' : 'live',
        });
        
        // Upload image if selected
        if (listingImageFile && newListing?.id) {
          try {
            const formData = new FormData();
            formData.append('images', listingImageFile);
            await api.uploadListingImages(newListing.id, [listingImageFile]);
          } catch (imgErr) {
            console.error('Image upload failed:', imgErr.message);
            // Don't fail the entire flow if image upload fails
          }
        }
      }

      await refreshMarketplace?.();
      setDone(true);
      setUser(u => ({ ...(u || {}), role: 'VENDOR' }));
    } catch (err) {
      setSubmitError(err.message || 'Failed to launch your business.');
    } finally {
      setSubmitting(false);
    }
  };

  const ensureOnboardingStore = async () => {
    try {
      const trimmedPhone = String(biz.phone || '').trim();
      const trimmedEmail = String(biz.email || '').trim();
      const trimmedWhatsapp = String(biz.whatsapp || '').trim();
      const trimmedBizDesc = String(biz.desc || '').trim();

      await api.createStore({
        bizName: String(biz.name || '').trim(),
        category: String(biz.category || '').trim(),
        location: String(biz.location || '').trim(),
        ...(trimmedPhone ? { bizPhone: trimmedPhone } : {}),
        ...(trimmedEmail ? { bizEmail: trimmedEmail } : {}),
        ...(trimmedWhatsapp ? { whatsapp: trimmedWhatsapp } : {}),
        ...(trimmedBizDesc ? { bizDesc: trimmedBizDesc } : {}),
      });
    } catch (err) {
      if (!String(err.message || '').toLowerCase().includes('already have a store')) {
        throw err;
      }
    }
  };

  const handlePlanContinue = async () => {
    setSubmitError("");

    if (biz.plan === 'free') {
      setStep(5);
      return;
    }

    if (!user?.accessToken) {
      setSubmitError("Please sign in first to continue.");
      return;
    }

    if (!biz.name || !biz.category || !biz.location) {
      setSubmitError("Business name, category, and location are required before payment.");
      return;
    }

    setPlanCheckoutLoading(true);
    try {
      api.setTokens(user.accessToken, user.refreshToken);
      await ensureOnboardingStore();

      const initiated = await api.initiateBoost({
        target: 'store',
        plan: biz.plan,
      });

      if (!initiated?.authorizationUrl) {
        throw new Error('Failed to initialize checkout. Please try again.');
      }

      markPendingPaystackCheckout('onboarding-plan', {
        plan: biz.plan,
        target: 'store',
      });
      window.location.href = initiated.authorizationUrl;
    } catch (err) {
      clearPendingPaystackCheckout();
      setSubmitError(err.message || 'Failed to initialize payment. Please try again.');
      setPlanCheckoutLoading(false);
    }
  };

  useEffect(() => {
    const resetCancelledCheckout = () => {
      recoverPendingPaystackCheckout('onboarding-plan', () => {
        setPlanCheckoutLoading(false);
        setSubmitError('Payment was cancelled or not completed. You can try again or choose another plan.');
      });
    };

    const handleVisibilityChange = () => {
      if (document.visibilityState === 'visible') {
        resetCancelledCheckout();
      }
    };

    resetCancelledCheckout();
    window.addEventListener('pageshow', resetCancelledCheckout);
    window.addEventListener('focus', resetCancelledCheckout);
    document.addEventListener('visibilitychange', handleVisibilityChange);

    return () => {
      window.removeEventListener('pageshow', resetCancelledCheckout);
      window.removeEventListener('focus', resetCancelledCheckout);
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    };
  }, []);

  if(done) return (
    <div style={{minHeight:"calc(100vh - 64px)",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"2rem"}}>
      <div style={{animation:"scaleIn .5s ease both"}}>
        <div style={{fontSize:"5rem",marginBottom:"1.5rem"}}>🎉</div>
        <h2 style={{fontFamily:"Syne",fontSize:"2rem",fontWeight:800,marginBottom:"1rem",color:"var(--navy)"}}>You're Live on LBC!</h2>
        <p style={{color:"var(--muted)",fontSize:"1rem",maxWidth:"35ch",margin:"0 auto 2rem"}}>Your business <strong>{biz.name||"listing"}</strong> has been submitted. You'll be live within 24 hours.</p>
        <div style={{background:"var(--g100)",border:"1px solid var(--g200)",borderRadius:"var(--r)",padding:"1.5rem",maxWidth:360,margin:"0 auto 2rem",textAlign:"left"}}>
          {["Our team reviews your listing (within 24hrs)","You receive a confirmation email","Your business goes live — sponsored slot activated","Customers start finding you via search & homepage"].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:".75rem",marginBottom:".6rem",fontSize:".85rem",color:"var(--g700)"}}>
              <span style={{color:"var(--green)",fontWeight:700,flexShrink:0}}>✓</span>{s}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"1rem",justifyContent:"center"}}>
          <button onClick={()=>setPage("home")} style={{background:"var(--blue)",color:"#fff",border:"none",padding:".875rem 2rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:"pointer"}}>🏠 Back to Home</button>
          <button onClick={()=>{ if(!user) setUser({name:biz.name||"Vendor",email:biz.email||"vendor@lbc.ng",phone:biz.phone||"",emailVerified:true,phoneVerified:false}); setPage("dashboard"); }} style={{background:"var(--g100)",border:"1px solid var(--g200)",padding:".875rem 2rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:"pointer"}}>📊 Go to Dashboard</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"calc(100vh - 64px)",background:"var(--offwhite)",padding:"2rem 1rem"}}>
      <div style={{maxWidth:680,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
          <h1 style={{fontFamily:"Syne",fontSize:"1.75rem",fontWeight:800,color:"var(--navy)",marginBottom:".5rem"}}>List Your Business on LBC</h1>
          <p style={{color:"var(--muted)",fontSize:".9rem"}}>Reach thousands of Lekki customers in minutes</p>
        </div>
        {/* Stepper */}
        <div style={{display:"flex",alignItems:"flex-start",marginBottom:"1.5rem",gap:".25rem"}}>
          {steps.map((s,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:".4rem"}}>
              <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".8rem",fontWeight:800,background:step>i+1?"var(--green)":step===i+1?"var(--blue)":"var(--g200)",color:step>=i+1?"#fff":"var(--muted)",transition:"all .3s"}}>
                {step>i+1?"✓":i+1}
              </div>
              <span style={{fontSize:".63rem",fontWeight:600,color:step===i+1?"var(--blue)":step>i+1?"var(--green)":"var(--muted)",textAlign:"center",lineHeight:1.2}}>{s}</span>
            </div>
          ))}
        </div>
        <div style={{height:4,background:"var(--g200)",borderRadius:4,marginBottom:"2.5rem",overflow:"hidden"}}>
          <div style={{height:"100%",background:"var(--blue)",borderRadius:4,width:`${((step-1)/4)*100}%`,transition:"width .4s ease"}} />
        </div>

        <div style={{background:"#fff",borderRadius:20,border:"1px solid var(--g200)",padding:"2.5rem",boxShadow:"var(--sh)",animation:"fadeUp .35s ease both"}}>
          {/* Step 1 */}
          {step===1&&(
            <div>
              <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.3rem",marginBottom:".5rem"}}>What type of business are you?</h3>

// Mini sparkline SVG
function Spark({ data, color }) {
  const max = Math.max(...data), min = Math.min(...data);
  const w = 80, h = 28;
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * h;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={w} height={h} style={{display:"block"}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// Simple bar chart
function BarChart({ data, color="#0066ff" }) {
  const max = Math.max(...data.map(d=>d.v));
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:160,paddingTop:"1rem"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{width:"100%",background:`${color}22`,borderRadius:4,overflow:"hidden",height:120,display:"flex",alignItems:"flex-end"}}>
            <div style={{width:"100%",background:color,borderRadius:4,height:`${(d.v/max)*100}%`,transition:"height .6s ease"}} />
          </div>
          <span style={{fontSize:".65rem",color:"var(--muted)",fontWeight:600}}>{d.l}</span>
        </div>
      ))}
    </div>
  );
}

// Line chart (pure SVG)
function LineChart({ datasets, labels }) {
  const W=560, H=180, PAD=36;
  const allVals = datasets.flatMap(d=>d.data || []);
  const max = Math.max(...allVals, 0), min = 0;
  const resolvedLabels = Array.isArray(labels) && labels.length > 0
    ? labels
    : ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const pts = (data) => data.map((v,i)=>{
    const x = PAD + ((data.length <= 1 ? 0 : i/(data.length-1)))*(W-PAD*2);
    const y = PAD + (1-(v-min)/(max-min||1))*(H-PAD*2);
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {/* Grid lines */}
      {[0,.25,.5,.75,1].map((t,i)=>{
        const y = PAD + t*(H-PAD*2);
        return <line key={i} x1={PAD} y1={y} x2={W-PAD} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
      })}
      {/* X labels */}
      {resolvedLabels.map((l,i)=>{
        const x = PAD + ((resolvedLabels.length <= 1 ? 0 : i/(resolvedLabels.length-1)))*(W-PAD*2);
        return <text key={i} x={x} y={H-6} textAnchor="middle" className="chart-x-lbl" fill="#94a3b8">{l}</text>;
      })}
      {/* Lines */}
      {datasets.map((ds,i)=>(
        <polyline key={i} points={pts(ds.data)} fill="none" stroke={ds.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" opacity={ds.active?1:0.15} />
      ))}
    </svg>
  );
}

  const sendPhoneOtp = async () => {
    if (!user?.accessToken) {
      setPhoneOtpError("Please sign in again to verify your phone.");

    const phoneForOtp = sanitizePhoneNumber(user?.phone || vendorSettings?.bizPhone || "");
    if (!phoneForOtp) {
      setPhoneOtpError("Please include a phone number first.");
      try { alert("Please include phone number first"); } catch (e) {}
      return;
    }

    // Always move to OTP screen immediately after the user clicks send.
    setTab("phone");
    setPhoneOtpSent(true);
    setPhoneOtpError("");
    setPhoneOtp(["","","","","",""]);
    setTimeout(() => phoneOtpRefs[0].current?.focus(), 100);

    setPhoneOtpLoading(true);
    try {
      api.setTokens(user.accessToken, user.refreshToken);
      await api.sendPhoneOtp();
      setPhoneCooldown(30);
      const t = setInterval(() => setPhoneCooldown(c => { if(c<=1){clearInterval(t);return 0;} return c-1; }), 1000);
    } catch (err) {
      setPhoneOtpError(err.message || "Failed to send OTP.");
      try { alert("failure, try again"); } catch (e) {}
    } finally {
      setPhoneOtpLoading(false);
    }

  const handlePhoneOtpKey = (i, e) => {
    if (e.key === "Backspace") {
      const next = [...phoneOtp]; next[i] = "";
      setPhoneOtp(next);
      if (i > 0) phoneOtpRefs[i-1].current?.focus();
      return;
    }
    if (!/^[0-9]$/.test(e.key)) return;
    const next = [...phoneOtp]; next[i] = e.key;
    setPhoneOtp(next);
    if (i < 5) phoneOtpRefs[i+1].current?.focus();
  };

  };

  const getBoostProgress = (startDate, endDate) => {
    if (!startDate || !endDate) return 0;
    const start = new Date(startDate).getTime();
    const end = new Date(endDate).getTime();
    const now = Date.now();
    if (Number.isNaN(start) || Number.isNaN(end) || end <= start) return 0;
    return Math.max(0, Math.min(100, Math.round(((now - start) / (end - start)) * 100)));
  };

  const getDaysLeft = (endDate) => {

                    <button onClick={()=>setTab("overview")} style={{background:"var(--g100)",color:"var(--text)",border:"1px solid var(--g200)",padding:".7rem 1.05rem",borderRadius:9,fontWeight:700,fontSize:".82rem",cursor:"pointer"}}>

                  <span style={{background:"rgba(34,197,94,.12)",color:"#15803d",padding:".3rem .7rem",borderRadius:999,fontSize:".78rem",fontWeight:700}}>✓ Verified</span>

                    Go to Dashboard
                  </button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── LISTINGS ── */}
        {tab==="listings" && (
          <div ref={listingsRootRef} className="dash-main" style={{padding:"2rem 2.25rem 2rem 1.35rem",position:"relative"}}>
            <div className="listing-toolbar-mobile" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2rem"}}>
              <div>
                <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",marginBottom:".25rem"}}>My Listings</h1>
                <p style={{color:"var(--muted)",fontSize:".85rem"}}>{listings.length} listings · {listings.filter(l=>l.status==="live").length} live</p>
              </div>
              <button className="listing-add-button" onClick={()=>setShowAddListing(true)} style={{background:"var(--navy)",color:"#fff",border:"none",padding:".75rem 1.5rem",borderRadius:10,fontWeight:700,fontSize:".85rem",cursor:"pointer"}}>+ List a Product</button>

                  <button onClick={resetListingComposer} style={{background:"var(--g100)",border:"none",borderRadius:8,padding:".4rem .75rem",cursor:"pointer",fontWeight:700,color:"var(--muted)",fontSize:".85rem"}}>✕ Cancel</button>

                <div className="listing-progress-mobile" style={{display:"flex",gap:".5rem",marginBottom:"1.75rem"}}>

                    <div key={s} style={{flex:1,display:"flex",alignItems:"center",gap:".4rem"}}>
                      <div style={{width:24,height:24,borderRadius:"50%",background:listingStep>i?"var(--green)":listingStep===i+1?"var(--blue)":"var(--g200)",color:listingStep>=i+1?"#fff":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".7rem",fontWeight:800,flexShrink:0}}>

                      </div>
                      <span style={{fontSize:".75rem",fontWeight:600,color:listingStep===i+1?"var(--blue)":listingStep>i?"var(--green)":"var(--muted)"}}>{s}</span>

                    </div>

                {/* Step 1 — Details */}
                {listingStep===1&&(
                  <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
                    {/* Type selector */}
                    <div>
                      <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".6rem"}}>Listing Type *</label>
                      <div className="listing-type-selector" style={{display:"flex",gap:".75rem"}}>
                        {[{id:"physical",icon:"📦",label:"Physical"},{id:"digital",icon:"💾",label:"Digital"},{id:"service",icon:"🔧",label:"Service"}].map(t=>(
                          <div key={t.id} onClick={()=>updL("type",t.id)} style={{flex:1,border:`2px solid ${newListing.type===t.id?"var(--blue)":"var(--g200)"}`,borderRadius:10,padding:".875rem",textAlign:"center",cursor:"pointer",background:newListing.type===t.id?"rgba(0,102,255,.04)":"#fff",transition:"all .2s"}}>
                            <div style={{fontSize:"1.4rem",marginBottom:".25rem"}}>{t.icon}</div>
                            <div style={{fontSize:".8rem",fontWeight:700,color:newListing.type===t.id?"var(--blue)":"var(--text)"}}>{t.label}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    {/* Title */}
                    <div>
                      <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Listing Title *</label>

                    </div>
                    {/* Price + Category */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>

                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Price (₦) *</label>

                      </div>
                      <div>
                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Category *</label>
                        <select value={newListing.category} onChange={e=>{updL("category",e.target.value); updL("subcategory","")}} style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",color:"var(--text)"}}>

                    {/* Subcategory */}

                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Subcategory</label>

                          {CATEGORIES.find(c=>c.id===newListing.category).subcategories.map(s=><option key={s} value={s}>{s}</option>)}

                      </div>

                    {/* Stock */}
                    <div>
                      <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Available Stock</label>

                    </div>
                    {/* Description */}
                    <div>
                      <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Description *</label>

                    </div>
                  </div>
                )}

                      <input ref={mainImageInputRef} type="file" accept="image/png,image/jpeg,image/webp" style={{display:"none"}} onChange={handleMainImageSelection} />
                      <div className="listing-main-upload" onClick={()=>mainImageInputRef.current?.click()} style={{border:"2px dashed var(--g300)",borderRadius:12,padding:"2.5rem",textAlign:"center",background:"var(--g100)",cursor:"pointer",color:"var(--muted)",transition:"all .2s"}}

                        onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--g300)";e.currentTarget.style.background="var(--g100)";}}>

                          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:".8rem"}}>
                            <img className="listing-preview-img" src={newListing.mainImagePreview} alt="Main listing preview" style={{width:160,height:160,borderRadius:14,objectFit:"cover",boxShadow:"var(--sh)"}} />
