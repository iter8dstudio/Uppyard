                              <p style={{fontWeight:700,fontSize:".9rem",marginBottom:".25rem",color:"var(--text)"}}>Main image selected</p>
                              <p style={{fontSize:".75rem"}}>Click to replace image</p>
                            </div>
                          </div>
                        ) : (
                          <>
                            <div style={{fontSize:"2.5rem",marginBottom:".75rem"}}>📸</div>
                            <p style={{fontWeight:700,fontSize:".9rem",marginBottom:".25rem"}}>Click to upload main image</p>
                            <p style={{fontSize:".75rem"}}>JPG, PNG or WEBP · Max 5MB · Recommended 800×800px</p>
                          </>
                        )}
                      </div>
                    </div>

                    {/* Gallery toggle */}
                    {newListing.type !== "service" && (
                      <div>
                        <div className="listing-gallery-header" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".75rem"}}>
                          <div>
                            <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)"}}>Product Gallery</label>
                            <p style={{fontSize:".75rem",color:"var(--muted)",marginTop:".15rem"}}>Add multiple angles or variations of your product.</p>
                          </div>
                          {/* Toggle switch */}
                          <div onClick={()=>updL("showGallery",!newListing.showGallery)} style={{width:44,height:24,borderRadius:12,background:newListing.showGallery?"var(--blue)":"var(--g300)",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
                            <div style={{position:"absolute",width:18,height:18,borderRadius:"50%",background:"#fff",top:3,left:newListing.showGallery?23:3,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}} />
                          </div>
                        </div>
                        {newListing.showGallery && (
                          <>
                            <input ref={galleryInputRef} type="file" accept="image/png,image/jpeg,image/webp" multiple style={{display:"none"}} onChange={handleGallerySelection} />
                            <div className="listing-gallery-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:".75rem"}}>
                              {Array.from({ length: 4 }).map((_, index) => {
                                const preview = newListing.galleryPreviews[index];

                                if (preview) {
                                  return (
                                    <div key={index} style={{position:"relative",borderRadius:10,aspectRatio:"1/1",overflow:"hidden",boxShadow:"var(--sh)"}}>
                                      <img src={preview} alt={`Gallery preview ${index + 1}`} style={{width:"100%",height:"100%",objectFit:"cover"}} />
                                      <button type="button" onClick={(event)=>{event.stopPropagation();removeGalleryImage(index);}} style={{position:"absolute",top:8,right:8,width:28,height:28,borderRadius:"50%",border:"none",background:"rgba(6,13,31,.75)",color:"#fff",fontWeight:800,cursor:"pointer"}}>
                                        ×
                                      </button>
                                    </div>
                                  );
                                }

                                return (
                                  <div className="listing-upload-slot" key={index} onClick={()=>galleryInputRef.current?.click()} style={{border:"2px dashed var(--g300)",borderRadius:10,aspectRatio:"1/1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"var(--g100)",color:"var(--muted)",fontSize:".72rem",gap:".3rem",transition:"all .2s"}}
                                    onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--blue)";}}
                                    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--g300)";}}>
                                    <span style={{fontSize:"1.25rem"}}>+</span>
                                    <span>{index === newListing.galleryPreviews.length ? 'Add image' : `Image ${index + 1}`}</span>
                                  </div>
                                );
                              })}
                            </div>
                          </>
                        )}
                      </div>
                    )}

                    {newListing.type === "service" && (
                      <div style={{background:"rgba(0,102,255,.04)",border:"1px solid rgba(0,102,255,.15)",borderRadius:10,padding:"1rem 1.25rem",fontSize:".83rem",color:"var(--blue)",fontWeight:500,lineHeight:1.6}}>
                        ℹ️ Gallery is disabled for service listings — a single representative image is recommended.
                      </div>
                    )}
                    {newListing.type === "digital" && (
                      <div style={{background:"rgba(168,85,247,.04)",border:"1px solid rgba(168,85,247,.15)",borderRadius:10,padding:"1rem 1.25rem",fontSize:".83rem",color:"#7c3aed",fontWeight:500,lineHeight:1.6}}>
                        💾 For digital products, gallery images are optional — you can toggle them off above if you prefer a single preview image.
                      </div>
                    )}
                  </div>
                )}

                {/* Step 3 — Review */}
                {listingStep===3&&(
                  <div>
                    <div style={{background:"var(--g100)",borderRadius:12,padding:"1.25rem",marginBottom:"1.25rem"}}>
                      {[
                        ["Type", newListing.type],
                        ["Title", newListing.title || "—"],
                        ["Price", newListing.price ? fmt(parseInt(newListing.price)) : "—"],
                        ["Stock", newListing.stock || "1"],
                        ["Category", CATEGORIES.find(c=>c.id===newListing.category)?.label || "—"],
                        ["Gallery", newListing.type==="service"?"N/A":newListing.showGallery?"Enabled":"Disabled"],
                      ].map(([k,v])=>(
                        <div key={k} style={{display:"flex",justifyContent:"space-between",padding:".6rem 0",borderBottom:"1px solid var(--g200)"}}>
                          <span style={{fontSize:".83rem",color:"var(--muted)",fontWeight:600}}>{k}</span>
                          <span style={{fontSize:".85rem",fontWeight:700,textTransform:"capitalize",color:"var(--text)"}}>{v}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:".75rem"}}>
                      <button onClick={()=>submitListing('live')} disabled={listingActionLoading}
                        style={{flex:1,background:listingActionLoading?"var(--g300)":"var(--blue)",color:listingActionLoading?"var(--muted)":"#fff",border:"none",padding:".875rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:listingActionLoading?"not-allowed":"pointer"}}>
                        {listingActionLoading?"Publishing…":"🚀 Publish Listing"}
                      </button>
                      <button onClick={()=>submitListing('draft')} disabled={listingActionLoading}
                        style={{flex:1,background:"var(--g100)",border:"1px solid var(--g200)",padding:".875rem",borderRadius:10,fontWeight:700,fontSize:".9rem",cursor:listingActionLoading?"not-allowed":"pointer",color:"var(--g700)"}}>
                        {listingActionLoading?"Saving…":"💾 Save as Draft"}
                      </button>
                    </div>
                  </div>
                )}

                {listingActionError && (
                  <div style={{marginTop:"1rem",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:".75rem 1rem",color:"var(--red)",fontSize:".83rem",fontWeight:600}}>
                    ⚠️ {listingActionError}
                  </div>
                )}

                {/* Step nav */}
                {listingStep < 3 && (
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.5rem",paddingTop:"1.25rem",borderTop:"1px solid var(--g100)"}}>
                    <button onClick={()=>listingStep>1?setListingStep(s=>s-1):resetListingComposer()} style={{background:"var(--g100)",border:"1px solid var(--g200)",padding:".7rem 1.5rem",borderRadius:10,fontWeight:600,fontSize:".85rem",cursor:"pointer",color:"var(--g700)"}}>
                      {listingStep===1?"Cancel":"← Back"}
                    </button>
                    <button onClick={()=>{
                      setListingActionError('');
                      setListingStep(s=>s+1);
                    }} style={{background:"var(--blue)",color:"#fff",border:"none",padding:".7rem 2rem",borderRadius:10,fontWeight:700,fontSize:".85rem",cursor:"pointer"}}>
                      Continue →
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* ── DELETE CONFIRMATION MODAL ── */}
            {deleteTarget && ReactDOM.createPortal(
              <div style={{position:"fixed",inset:0,background:"rgba(6,13,31,.78)",backdropFilter:"blur(4px)",WebkitBackdropFilter:"blur(4px)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}} onClick={()=>setDeleteTarget(null)}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:"2rem",maxWidth:400,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,.25)",animation:"scaleIn .25s ease both"}}>
                  <div style={{fontSize:"2.5rem",marginBottom:"1rem",textAlign:"center"}}>🗑️</div>
                  <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.1rem",textAlign:"center",marginBottom:".5rem"}}>Delete this listing?</h3>
                  <p style={{color:"var(--muted)",fontSize:".85rem",textAlign:"center",lineHeight:1.6,marginBottom:"1.5rem"}}>
                    <strong>"{deleteTarget.name}"</strong> will be permanently removed. This cannot be undone.
                  </p>
                  <div style={{display:"flex",gap:".75rem"}}>
                    <button onClick={()=>setDeleteTarget(null)} style={{flex:1,background:"var(--g100)",border:"1px solid var(--g200)",borderRadius:10,padding:".8rem",fontWeight:700,fontSize:".88rem",cursor:"pointer",color:"var(--g700)"}}>Cancel</button>
                    <button onClick={()=>doDelete(deleteTarget.id)} style={{flex:1,background:"var(--red)",color:"#fff",border:"none",borderRadius:10,padding:".8rem",fontWeight:700,fontSize:".88rem",cursor:"pointer"}}>Yes, Delete</button>
                  </div>
                </div>
              </div>,
              document.body
            )}

            {/* ── EDIT MODAL ── */}
            {editListing && ReactDOM.createPortal(
              <div style={{position:"fixed",inset:0,background:"rgba(6,13,31,.78)",backdropFilter:"blur(4px)",WebkitBackdropFilter:"blur(4px)",zIndex:9999,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"clamp(.75rem, 2vw, 1rem)",overflowY:"auto",overflowX:"hidden",overscrollBehavior:"contain"}} onClick={resetEditComposer}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:"2rem",width:"min(560px, 100%)",maxHeight:"calc(100dvh - 2rem)",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,.25)",animation:"scaleIn .25s ease both",margin:"auto 0"}}>
                  {/* Header */}
                  <div className="listing-composer-header" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
                    <h3 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.1rem"}}>
                      {editStep===1?"✏️ Edit Details":editStep===2?"🖼️ Edit Media":"✅ Save Changes"}
                    </h3>
                    <button onClick={resetEditComposer} style={{background:"var(--g100)",border:"none",borderRadius:8,padding:".4rem .75rem",cursor:"pointer",fontWeight:700,color:"var(--muted)",fontSize:".85rem"}}>✕</button>
                  </div>

                  {/* Step indicator */}
                  <div className="listing-progress-mobile" style={{display:"flex",gap:".5rem",marginBottom:"1.75rem"}}>
                    {["Details","Media","Save"].map((s,i)=>(
                      <div key={s} style={{flex:1,display:"flex",alignItems:"center",gap:".4rem"}}>
                        <div style={{width:22,height:22,borderRadius:"50%",background:editStep>i?"var(--green)":editStep===i+1?"var(--blue)":"var(--g200)",color:editStep>=i+1?"#fff":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",fontWeight:800,flexShrink:0}}>
                          {editStep>i?"✓":i+1}
                        </div>
                        <span style={{fontSize:".73rem",fontWeight:600,color:editStep===i+1?"var(--blue)":editStep>i?"var(--green)":"var(--muted)"}}>{s}</span>
                        {i<2&&<div style={{flex:1,height:2,background:editStep>i+1?"var(--green)":"var(--g200)",borderRadius:2}} />}
                      </div>
                    ))}
                  </div>

                  {/* Step 1 — Details */}
                  {editStep===1&&(
                    <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
                      {/* Type */}
                      <div>
                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".6rem"}}>Listing Type</label>
                        <div className="listing-type-selector" style={{display:"flex",gap:".6rem"}}>
                          {[{id:"physical",icon:"📦",label:"Physical"},{id:"digital",icon:"💾",label:"Digital"},{id:"service",icon:"🔧",label:"Service"}].map(t=>(
                            <div key={t.id} onClick={()=>updEdit("type",t.id)} style={{flex:1,border:`2px solid ${editListing.type===t.id?"var(--blue)":"var(--g200)"}`,borderRadius:10,padding:".75rem",textAlign:"center",cursor:"pointer",background:editListing.type===t.id?"rgba(0,102,255,.04)":"#fff",transition:"all .2s"}}>
                              <div style={{fontSize:"1.2rem",marginBottom:".2rem"}}>{t.icon}</div>
                              <div style={{fontSize:".75rem",fontWeight:700,color:editListing.type===t.id?"var(--blue)":"var(--text)"}}>{t.label}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                      {/* Name */}
                      <div>
                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Listing Title *</label>
                        <input value={editListing.name} onChange={e=>updEdit("name",e.target.value)} style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}} onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
                      </div>
                      {/* Price + Category */}
                      <div className="listing-two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
                        <div>
                          <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Price (₦) *</label>
                          <input value={editListing.price} onChange={e=>updEdit("price",parseInt(e.target.value)||0)} type="number" style={{width:"100%",minWidth:0,padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}} onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
                        </div>
                        <div>
                          <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Category *</label>
                          <select value={editListing.category} onChange={e=>updEdit("category",e.target.value)} style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",color:"var(--text)"}}>
                            {CATEGORIES.filter(c=>c.id!=="all").map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
                          </select>
                        </div>
                      </div>
                      {/* Subcategory */}
                      {CATEGORIES.find(c=>c.id===editListing.category)?.subcategories && (
                        <div>
                          <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Subcategory</label>
                          <select value={editListing.subcategory || ""} onChange={e=>updEdit("subcategory",e.target.value)} style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",color:"var(--text)"}}>
                            <option value="">Select Subcategory</option>
                            {CATEGORIES.find(c=>c.id===editListing.category).subcategories.map(s=><option key={s} value={s}>{s}</option>)}
                          </select>
                        </div>
                      )}
                      {/* Stock */}
                      <div>
                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Available Stock</label>
                        <input value={editListing.stock || 1} onChange={e=>updEdit("stock",Math.max(1, parseInt(e.target.value) || 1))} type="number" placeholder="e.g. 10" min="1" style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none"}} onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--g200)"} />
                        <p style={{fontSize:".7rem",color:"var(--muted)",marginTop:".3rem"}}>Stock decrements when products are sold.</p>
                      </div>
                      {/* Description */}
                      <div>
                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".4rem"}}>Description</label>
                        <textarea value={editListing.desc||""} onChange={e=>updEdit("desc",e.target.value)} rows={3} style={{width:"100%",padding:".75rem 1rem",borderRadius:8,border:"1px solid var(--g200)",fontSize:".9rem",outline:"none",resize:"vertical",lineHeight:1.6}} />
                      </div>
                    </div>
                  )}

                  {/* Step 2 — Media */}
                  {editStep===2&&(
                    <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
                      {/* Current image preview */}
                      <div>
                        <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".6rem"}}>Current Main Image</label>
                        <div 
                          onClick={()=>editMainImageInputRef.current?.click()}
                          style={{display:"flex",gap:"1rem",alignItems:"center",background:"var(--g100)",borderRadius:10,padding:"1rem",cursor:"pointer",transition:"all .2s",border:"2px solid transparent"}}
                          onMouseEnter={e=>{e.currentTarget.style.background="rgba(0,102,255,.05)";e.currentTarget.style.borderColor="var(--blue)"}}
                          onMouseLeave={e=>{e.currentTarget.style.background="var(--g100)";e.currentTarget.style.borderColor="transparent"}}>
                          <img src={editMainImagePreview || editListing.img} style={{width:64,height:64,borderRadius:8,objectFit:"cover",flexShrink:0}} />
                          <div>
                            <p style={{fontSize:".82rem",fontWeight:600,marginBottom:".25rem"}}>Current image</p>
                            <button onClick={(e)=>{e.stopPropagation();editMainImageInputRef.current?.click();}} style={{fontSize:".75rem",color:"var(--blue)",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0}}>🔄 Replace image</button>
                          </div>
                        </div>
                        <input 
                          ref={editMainImageInputRef}
                          type="file"
                          accept="image/jpeg,image/png,image/webp"
                          onChange={handleEditMainImageSelect}
                          style={{display:"none"}}
                        />
                        {editMainImageFile && (
                          <div style={{fontSize:".75rem",color:"var(--green)",fontWeight:600,marginTop:".5rem"}}>✓ Main image ready to upload: {editMainImageFile.name}</div>
                        )}
                      </div>
                      {/* Gallery */}
                      {editListing.type !== "service" && (
                        <div>
                          <label style={{display:"block",fontSize:".82rem",fontWeight:700,color:"var(--g700)",marginBottom:".5rem"}}>Gallery Images (up to 4)</label>
                          <div className="edit-gallery-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:".6rem"}}>
                            {[0,1,2,3].map(i=>(
                              <div key={i}>
                                <div className="listing-upload-slot"
                                  onClick={()=>editGalleryInputRefs[i].current?.click()}
                                  style={{border:editGalleryPreviews[i]?"2px solid var(--green)":"2px dashed var(--g300)",borderRadius:8,aspectRatio:"1/1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:editGalleryPreviews[i]?"rgba(34,197,94,.04)":"var(--g100)",color:"var(--muted)",fontSize:".7rem",gap:".2rem",transition:"all .2s",position:"relative",overflow:"hidden"}}
                                  onMouseEnter={e=>!editGalleryPreviews[i]&&(e.currentTarget.style.borderColor="var(--blue)",e.currentTarget.style.background="rgba(0,102,255,.05)")}
                                  onMouseLeave={e=>!editGalleryPreviews[i]&&(e.currentTarget.style.borderColor="var(--g300)",e.currentTarget.style.background="var(--g100)")}>
                                  {editGalleryPreviews[i] ? (
                                    <>
                                      <img src={editGalleryPreviews[i]} alt={`Gallery ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:8}} />
                                      <div style={{position:"absolute",left:6,bottom:6,background:"rgba(6,13,31,.7)",color:"#fff",fontSize:".58rem",fontWeight:700,padding:".2rem .35rem",borderRadius:999}}>{editGalleryFiles[i] ? "Selected" : "Current"}</div>
                                    </>
                                  ) : (
                                    <>
                                      <span style={{fontSize:"1.1rem"}}>+</span>
                                      <span>Img {i+1}</span>
                                    </>
                                  )}
                                </div>
                                <input 
                                  ref={editGalleryInputRefs[i]}
                                  type="file"
                                  accept="image/jpeg,image/png,image/webp"
                                  onChange={(e)=>handleEditGalleryImageSelect(i, e)}
                                  style={{display:"none"}}
                                />
                              </div>
                            ))}
                          </div>
                          <p style={{fontSize:".7rem",color:"var(--muted)",marginTop:".4rem"}}>Click any slot to add an image. You can add up to 4 gallery images.</p>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Step 3 — Confirm */}
                  {editStep===3&&(
                    <div>
                      <div style={{background:"var(--g100)",borderRadius:12,padding:"1.1rem",marginBottom:"1.25rem"}}>
                        {[["Title",editListing.name],["Type",editListing.type],["Price",fmt(editListing.price)],["Stock",editListing.stock||1],["Category",CATEGORIES.find(c=>c.id===editListing.category)?.label||""]].map(([k,v])=>(
                          <div key={k} style={{display:"flex",justifyContent:"space-between",padding:".55rem 0",borderBottom:"1px solid var(--g200)"}}>
                            <span style={{fontSize:".82rem",color:"var(--muted)",fontWeight:600}}>{k}</span>
                            <span style={{fontSize:".84rem",fontWeight:700,textTransform:"capitalize"}}>{v}</span>
                          </div>
                        ))}
                      </div>
                      <button onClick={doSaveEdit} style={{width:"100%",background:"var(--blue)",color:"#fff",border:"none",padding:".9rem",borderRadius:10,fontWeight:800,fontSize:".95rem",cursor:"pointer"}}>✓ Save Changes</button>
                    </div>
                  )}

                  {/* Step nav */}
                  {editStep < 3 && (
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.5rem",paddingTop:"1.25rem",borderTop:"1px solid var(--g100)"}}>
                      <button onClick={()=>editStep>1?setEditStep(s=>s-1):(setEditListing(null),setEditStep(1))} style={{background:"var(--g100)",border:"1px solid var(--g200)",padding:".7rem 1.5rem",borderRadius:10,fontWeight:600,fontSize:".85rem",cursor:"pointer",color:"var(--g700)"}}>
                        {editStep===1?"Cancel":"← Back"}
                      </button>
                      <button onClick={()=>setEditStep(s=>s+1)} style={{background:"var(--blue)",color:"#fff",border:"none",padding:".7rem 2rem",borderRadius:10,fontWeight:700,fontSize:".85rem",cursor:"pointer"}}>
                        Continue →
                      </button>
                    </div>
                  )}
                </div>
              </div>,
              document.body
            )}

            {/* Listings table */}
            <div className="dash-listings-scroll" style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:"var(--r)",overflowX:"auto",overflowY:"visible",position:"relative",zIndex:2}} onClick={()=>{setOpenMenuId(null);setMenuPosition(null);}} onScroll={()=>{if(openMenuId){setOpenMenuId(null);setMenuPosition(null);}}}>
              <table className="dash-listings-table" style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"var(--g100)",borderBottom:"1px solid var(--g200)"}}>
                    {["Product","Type","Price","Stock","Views","Status","Boost","Actions"].map(h=>(
                      <th key={h} style={{padding:".75rem 1rem",textAlign:"left",fontSize:".75rem",fontWeight:700,color:"var(--muted)",letterSpacing:".04em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {listings.map((l,i)=>(
                    <tr key={l.id} style={{borderBottom:i<listings.length-1?"1px solid var(--g100)":"none",transition:"background .15s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="var(--g100)"}
                      onMouseLeave={e=>e.currentTarget.style.background=""}>
                      <td style={{padding:".875rem 1rem"}}>
                        <div style={{display:"flex",alignItems:"center",gap:".75rem"}}>
                          <img src={l.img} style={{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0}} />
                          <span style={{fontWeight:600,fontSize:".875rem"}}>{l.name}</span>
                        </div>
                      </td>
                      <td style={{padding:".875rem 1rem"}}>
                        <span style={{fontSize:".75rem",fontWeight:600,background:"var(--g100)",padding:".2rem .55rem",borderRadius:4,color:"var(--g700)",textTransform:"capitalize"}}>{l.type==="physical"?"📦":l.type==="digital"?"💾":"🔧"} {l.type}</span>
                      </td>
                      <td style={{padding:".875rem 1rem",fontFamily:"Syne",fontWeight:700,fontSize:".9rem"}}>{fmt(l.price)}</td>
                      <td style={{padding:".875rem 1rem",fontSize:".82rem",fontWeight:600}}>
                        <span style={{display:"inline-flex",alignItems:"center",gap:".35rem",background:(l.stock||0) <= 3?"rgba(239,68,68,.1)":"rgba(34,197,94,.1)",color:(l.stock||0) <= 3?"#dc2626":"#15803d",padding:".3rem .65rem",borderRadius:6}}>
                          {(l.stock || 0) <= 0 ? "Out" : (l.stock || 0) <= 3 ? "Low" : "In stock"} ({l.stock || 0})
                        </span>
                      </td>
                      <td style={{padding:".875rem 1rem",fontSize:".85rem",color:"var(--muted)",fontWeight:600}}>{l.views.toLocaleString()}</td>
                      <td style={{padding:".875rem 1rem"}}>
                        <span style={{fontSize:".72rem",fontWeight:700,padding:".25rem .65rem",borderRadius:100,
                          background:l.status==="live"?"rgba(34,197,94,.1)":l.status==="unpublished"?"rgba(239,68,68,.08)":"var(--g100)",
                          color:l.status==="live"?"#15803d":l.status==="unpublished"?"var(--red)":"var(--muted)"}}>
                          {l.status==="live"?"● Live":l.status==="unpublished"?"○ Unpublished":"○ Draft"}
                        </span>
                      </td>
                      <td style={{padding:".875rem 1rem"}}>
                        {l.sponsored
                          ? <span style={{fontSize:".72rem",fontWeight:700,color:"#92600a",background:"rgba(245,158,11,.1)",padding:".25rem .6rem",borderRadius:100}}>⚡ Boosted</span>
                          : <button onClick={()=>{setBoostProduct(l.id);setTab("boosts");}} style={{fontSize:".75rem",fontWeight:700,color:"var(--blue)",background:"rgba(0,102,255,.08)",border:"none",padding:".3rem .75rem",borderRadius:100,cursor:"pointer"}}>+ Boost</button>
                        }
                      </td>
                      {/* Actions dropdown */}
                      <td style={{padding:".875rem 1rem",position:"relative",zIndex:openMenuId===l.id?40:"auto"}}>
                        <button onClick={e=>{
                          e.stopPropagation();
                          if (openMenuId === l.id) {
                            setOpenMenuId(null);
                            setMenuPosition(null);
                            return;
                          }
                          const rect = e.currentTarget.getBoundingClientRect();
                          const menuWidth = 188;
                          const left = Math.max(12, Math.min(rect.right - menuWidth, window.innerWidth - menuWidth - 12));
                          const top = Math.min(rect.bottom + 6, window.innerHeight - 160);
                          setMenuPosition({ top, left });
                          setOpenMenuId(l.id);
                        }}
                          style={{background:openMenuId===l.id?"var(--g200)":"var(--g100)",border:"1px solid var(--g200)",borderRadius:8,padding:".35rem .75rem",cursor:"pointer",fontWeight:700,color:"var(--g700)",fontSize:".85rem",transition:"background .15s"}}>
                          ⋯
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {listings.length===0&&(
                <div style={{padding:"3rem",textAlign:"center",color:"var(--muted)"}}>
                  <div style={{fontSize:"2.5rem",marginBottom:".75rem"}}>📭</div>
                  <p style={{fontWeight:600,marginBottom:".25rem"}}>No listings yet</p>
                  <p style={{fontSize:".85rem"}}>Click "List a Product" to add your first listing.</p>
                </div>
              )}
            </div>

            {openMenuId && menuPosition && (() => {
              const activeListing = listings.find((item) => item.id === openMenuId);
              if (!activeListing) return null;

              return ReactDOM.createPortal(
                <div onClick={e=>e.stopPropagation()} style={{position:"fixed",left:menuPosition.left,top:menuPosition.top,background:"#fff",border:"1px solid var(--g200)",borderRadius:12,boxShadow:"0 8px 32px rgba(6,13,31,.14)",zIndex:9999,minWidth:180,overflow:"hidden",animation:"fadeUp .15s ease both"}}>
                  <button onClick={()=>{openEditComposer(activeListing);setOpenMenuId(null);setMenuPosition(null);}}
                    style={{display:"flex",alignItems:"center",gap:".6rem",width:"100%",padding:".75rem 1rem",border:"none",background:"none",cursor:"pointer",fontSize:".85rem",fontWeight:600,color:"var(--text)",textAlign:"left"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--g100)"}
                    onMouseLeave={e=>e.currentTarget.style.background="none"}>
                    ✏️ Edit Listing
                  </button>
                  <button onClick={()=>{doUnpublish(activeListing.id);setMenuPosition(null);}}
                    style={{display:"flex",alignItems:"center",gap:".6rem",width:"100%",padding:".75rem 1rem",border:"none",background:"none",cursor:"pointer",fontSize:".85rem",fontWeight:600,color:activeListing.status==="live"?"#92600a":"#15803d",textAlign:"left",borderTop:"1px solid var(--g100)"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--g100)"}
                    onMouseLeave={e=>e.currentTarget.style.background="none"}>
                    {activeListing.status==="live"?"⏸ Unpublish":"▶ Republish"}
                  </button>
                  <button onClick={()=>{setDeleteTarget(activeListing);setOpenMenuId(null);setMenuPosition(null);}}
                    style={{display:"flex",alignItems:"center",gap:".6rem",width:"100%",padding:".75rem 1rem",border:"none",background:"none",cursor:"pointer",fontSize:".85rem",fontWeight:600,color:"var(--red)",textAlign:"left",borderTop:"1px solid var(--g100)"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#fef2f2"}
                    onMouseLeave={e=>e.currentTarget.style.background="none"}>
                    🗑️ Delete Listing
                  </button>
                </div>,
                document.body
              );
            })()}
          </div>
        )}

        {/* ── ANALYTICS ── */}
        {tab==="analytics" && (
          <div className="dash-main" style={{padding:"2rem 2.5rem"}}>
            <div style={{marginBottom:"2rem"}}>
              <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",marginBottom:".25rem"}}>Analytics</h1>
              <p style={{color:"var(--muted)",fontSize:".85rem"}}>Track how your listings and store are performing.</p>
            </div>

            {/* Summary row — calculated from real data */}
            <div className="dash-analytics-stats" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1.25rem",marginBottom:"2rem"}}>
              {(() => {
                const totalViews = listingAnalytics.reduce((sum, l) => sum + (l.views || 0), 0) || 0;
                const totalClicks = listingAnalytics.reduce((sum, l) => sum + (l.waClicks || 0), 0) || 0;
                const avgDaily = listingAnalytics.length > 0 ? Math.round(totalViews / 30) : 0;
                const tapRate = totalViews > 0 ? ((totalClicks / totalViews) * 100).toFixed(2) : "0";
                return [
                  {label:"Total Page Visits",val:totalViews.toLocaleString(),change:"+12%",color:"var(--blue)"},
                  {label:"Avg. Daily Views",val:avgDaily.toLocaleString(),change:"+8%",color:"#22c55e"},
                  {label:"WhatsApp Tap Rate",val:`${tapRate}%`,change:"+0.4%",color:"var(--amber)"},
                ];
              })().map(s=>(
                <div key={s.label} style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:"var(--r)",padding:"1.5rem"}}>
                  <div style={{fontSize:".78rem",color:"var(--muted)",fontWeight:600,marginBottom:".4rem"}}>{s.label}</div>
                  <div style={{fontFamily:"Syne",fontSize:"2rem",fontWeight:800,marginBottom:".25rem"}}>{s.val}</div>
                  <span style={{fontSize:".72rem",fontWeight:700,color:"#15803d",background:"rgba(34,197,94,.1)",padding:".2rem .55rem",borderRadius:6}}>{s.change} vs last month</span>
                </div>
              ))}
            </div>

            {/* Page visits chart */}
            <div className="dash-analytics-charts" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
              <div style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:"var(--r)",padding:"1.5rem"}}>
                <h3 style={{fontFamily:"Syne",fontWeight:700,fontSize:"1rem",marginBottom:"1.25rem"}}>Page Visits — Last 12 Months</h3>
                <LineChart datasets={[
                  { key:"traffic", color:"#0066ff", label:"Traffic", data: chartData.traffic?.length > 0 ? chartData.traffic : Array(12).fill(0), active: true }
                ]} />
              </div>
              <div style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:"var(--r)",padding:"1.5rem"}}>
                <h3 style={{fontFamily:"Syne",fontWeight:700,fontSize:"1rem",marginBottom:"1.25rem"}}>WhatsApp Clicks — Last 12 Months</h3>
                <LineChart datasets={[
                  { key:"contacts", color:"#25D366", label:"Contacts", data: chartData.contacts?.length > 0 ? chartData.contacts : Array(12).fill(0), active: true }
                ]} />
              </div>
            </div>

            {/* Top performing products */}
            <div style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:"var(--r)",padding:"1.5rem"}}>
              <h3 style={{fontFamily:"Syne",fontWeight:700,fontSize:"1rem",marginBottom:"1.25rem"}}>🏆 Top Performing Listings by Visibility</h3>
              {listingAnalytics.length === 0 ? (
                <div style={{padding:"2rem",textAlign:"center",color:"var(--muted)"}}>
                  <p style={{fontWeight:600,marginBottom:".25rem"}}>No listing data yet</p>
                  <p style={{fontSize:".85rem"}}>Create listings to see analytics.</p>
                </div>
              ) : (
                listingAnalytics.slice(0, 6).map((l, i) => {
                  const maxViews = Math.max(...listingAnalytics.map(x => x.views || 0), 1);
                  const pct = l.views ? Math.round((l.views / maxViews) * 100) : 0;
                  return (
                    <div key={l.id} style={{display:"flex",alignItems:"center",gap:"1rem",padding:".875rem 0",borderBottom:i<listingAnalytics.slice(0, 6).length - 1?"1px solid var(--g100)":"none"}}>
                      <span style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.1rem",color:"var(--muted)",width:24,textAlign:"center"}}>{i+1}</span>
                      <img src={l.mainImage || "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=60&h=60&fit=crop"} style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}} />
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:".88rem",marginBottom:".3rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.title}</div>
                        <div style={{height:6,background:"var(--g100)",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:i===0?"var(--blue)":i===1?"#22c55e":i===2?"var(--amber)":"var(--g300)",borderRadius:4}} />
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:".88rem",fontWeight:700}}>{(l.views || 0).toLocaleString()} views</div>
                        <div style={{fontSize:".72rem",color:"var(--muted)"}}>{(l.waClicks || 0)} WA clicks</div>
                      </div>
                      {l.sponsored && <span style={{fontSize:".65rem",fontWeight:800,color:"#92600a",background:"rgba(245,158,11,.12)",padding:".2rem .5rem",borderRadius:4,flexShrink:0}}>⚡</span>}
                    </div>
                  );
                })
              )}
            </div>
          </div>
        )}

        {/* ── BOOSTS ── */}
        {tab==="boosts" && (
          <div style={{padding:"2rem 2.25rem 2rem 1.35rem"}}>
            <div style={{marginBottom:"2rem"}}>
              <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.4rem",marginBottom:".25rem"}}>Boosts</h1>
              <p style={{color:"var(--muted)",fontSize:".85rem"}}>Promote a product or your entire storefront to appear first in search and on the homepage.</p>
            </div>

            {boostDone ? (
              <div style={{background:"#fff",border:"1px solid var(--g200)",borderRadius:20,padding:"3rem",textAlign:"center",animation:"scaleIn .4s ease both"}}>
                <div style={{fontSize:"4rem",marginBottom:"1rem"}}>⚡</div>
                <h2 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.5rem",marginBottom:".75rem",color:"var(--navy)"}}>Boost Activated!</h2>
                <p style={{color:"var(--muted)",fontSize:".9rem",marginBottom:"2rem"}}>Your listing will appear as sponsored within the next few minutes.</p>

function BoostCallbackPage({ setPage, setUser }) {
  const [state, setState] = useState({ status: 'verifying', message: 'Confirming your Paystack payment and activating your boost…' });

  useEffect(() => {
    clearPendingPaystackCheckout();

    let mounted = true;
    const params = new URLSearchParams(window.location.search);
    const reference = params.get('reference') || params.get('trxref');

    const finish = async () => {
      if (!reference) {
        if (mounted) {
          setState({ status: 'error', message: 'Missing payment reference. Please return to your dashboard and try again.' });
        }
        return;
      }

      try {
        const verified = await api.verifyBoost(reference);
        const me = await api.getMe();

        if (!mounted) return;

        setUser({
          ...(me || {}),
          accessToken: api.accessToken,
          refreshToken: api.refreshToken,
        });

        setState({
          status: 'success',
          message: verified?.message || 'Boost activated successfully. Redirecting to your dashboard…',
        });

        setTimeout(() => {
          setPage('dashboard', { replace: true });
        }, 2500);
      } catch (err) {
        if (mounted) {
          setState({ status: 'error', message: err.message || 'Payment verification failed. Please contact support if you were charged.' });
        }
      }
    };

    finish();
    return () => { mounted = false; };
  }, [setPage, setUser]);

  return (
    <div style={{minHeight:"calc(100vh - 64px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",background:"var(--offwhite)"}}>
      <div style={{maxWidth:560,width:"100%",background:"#fff",border:"1px solid var(--g200)",borderRadius:20,padding:"3rem",textAlign:"center",boxShadow:"var(--sh)"}}>
        <div style={{fontSize:"4rem",marginBottom:"1rem"}}>{state.status === 'success' ? '⚡' : state.status === 'error' ? '⚠️' : '⟳'}</div>
        <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"1.8rem",marginBottom:".75rem",color:"var(--navy)"}}>
          {state.status === 'success' ? 'Boost Confirmed' : state.status === 'error' ? 'Boost Verification Failed' : 'Verifying Payment'}
        </h1>
        <p style={{fontSize:".92rem",lineHeight:1.7,color:"var(--muted)",marginBottom:"1.5rem"}}>{state.message}</p>
        {state.status === 'success' && (
          <div style={{background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.2)",borderRadius:12,padding:"1rem 1.25rem",fontSize:".84rem",fontWeight:600,color:"#15803d",lineHeight:1.6}}>
            Your sponsored placement is now being applied. You will be redirected to your dashboard automatically.
          </div>
        )}
        {state.status === 'error' && (
          <button onClick={() => setPage('dashboard', { replace: true })} style={{marginTop:"1rem",background:"var(--blue)",color:"#fff",border:"none",padding:".85rem 1.5rem",borderRadius:10,fontWeight:700,cursor:"pointer"}}>
            Back to Dashboard
          </button>
        )}
      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const initialRoute = resolveAppRoute();
  const [page,setPageState] = useState(initialRoute.page);
  const [searchQ,setSearchQ] = useState(initialRoute.searchQ || "");
  const [activeCategory,setActiveCategory] = useState(initialRoute.activeCategory || "all");
  const [wishlist,setWishlist] = useState(() => readWishlistCache());
  const [cart,setCart] = useState([]);
  const [user,setUser] = useState(null);
  const [selectedProduct,setSelectedProductState] = useState(null);
  const [selectedBusiness,setSelectedBusinessState] = useState(null);
  const [storefrontBiz,setStorefrontBiz] = useState(null);
  const [marketProducts, setMarketProducts] = useState([]);
  const [marketBusinesses, setMarketBusinesses] = useState([]);
  const routeStateRef = useRef({
    page: initialRoute.page,
    searchQ: initialRoute.searchQ || "",
    activeCategory: initialRoute.activeCategory || "all",
    selectedProduct: null,
    storefrontBiz: null,
  });

  const setPage = useCallback((nextPage, options = {}) => {
    if (typeof nextPage === "function") {
      setPageState((currentPage) => nextPage(currentPage));
      return;
    }

    const normalizedPage = nextPage === "boosts" ? "dashboard" : (nextPage || "home");
    const explicitBiz = Object.prototype.hasOwnProperty.call(options, "biz") ? options.biz : undefined;
    const nextProduct = normalizedPage === "product" ? (options.product ?? routeStateRef.current.selectedProduct ?? null) : null;
    const nextBiz = normalizedPage === "storefront" ? (explicitBiz !== undefined ? explicitBiz : null) : null;
    const nextRouteState = {
      page: normalizedPage,
      searchQ: options.searchQ ?? routeStateRef.current.searchQ ?? "",
      activeCategory: options.activeCategory ?? routeStateRef.current.activeCategory ?? "all",
      selectedProduct: nextProduct,
      storefrontBiz: nextBiz,
    };

    if (options.product) {
      setSelectedProductState(options.product);
    }
    if (normalizedPage === "storefront") {
      setStorefrontBiz(nextBiz);
    }

    routeStateRef.current = nextRouteState;
    setPageState(normalizedPage);

    const nextUrl = buildAppUrl(normalizedPage, {
      searchQ: nextRouteState.searchQ,
      activeCategory: nextRouteState.activeCategory,
      product: nextRouteState.selectedProduct,
      biz: nextRouteState.storefrontBiz,
    });
    const currentUrl = `${window.location.pathname}${window.location.search}`;

    if (options.replace || currentUrl === nextUrl) {
      window.history.replaceState(nextRouteState, "", nextUrl);
    } else {
      window.history.pushState(nextRouteState, "", nextUrl);
    }
  }, []);

  // Global vendor settings — synced with backend user data
  const [vendorSettings, setVendorSettings] = useState({
    // Personal
    name:"", email:"", phone:"",
    // Store
    bizName:"", bizCategory:"", bizLocation:"",
    whatsapp:"", bizPhone:"", bizEmail:"",
    bizDesc:"", logo:"", banner:"", accentColor:"", showStockCount:true,
    storeCreatedAt:null, storeId:null,
    // Notifications
    emailNotif:true, smsAlert:true, browserNotif:false,
    waLeads:true, boostExpiry:true, weeklyReport:false,
  });

  const refreshMarketplace = useCallback(async ({ preferCache = false } = {}) => {
    const cachedMarketplace = readMarketplaceCache();

    if (preferCache && cachedMarketplace) {
      setMarketProducts(cachedMarketplace.products);
      setMarketBusinesses(cachedMarketplace.businesses);
    }

    const [listingsResult, storesResult] = await Promise.allSettled([
      api.getListings({ limit: 200 }),
      api.getStores({ limit: 200 }),
    ]);

    const storePayload = storesResult.status === 'fulfilled' ? getCollection(storesResult.value, 'stores') : [];
    const listingPayload = listingsResult.status === 'fulfilled' ? getCollection(listingsResult.value, 'listings') : [];
    const normalizedStores = storePayload.map(normalizeStore).filter(Boolean);
    const storesById = new Map(normalizedStores.map((store) => [store.id, store]));
    const normalizedListings = listingPayload.map((listing) => normalizeListing(listing, storesById)).filter(Boolean);
    const hasFreshMarketplaceResponse = listingsResult.status === 'fulfilled' || storesResult.status === 'fulfilled';

    if (hasFreshMarketplaceResponse) {
      setMarketBusinesses(normalizedStores);
      setMarketProducts(normalizedListings);
      writeMarketplaceCache(normalizedListings, normalizedStores);
    } else if (!cachedMarketplace) {
      setMarketBusinesses([]);
      setMarketProducts([]);
    }

    return {
      products: normalizedListings,
      businesses: normalizedStores,
    };
  }, []);

  const toggleWish = useCallback(async (id) => {
    const isSaved = wishlist.includes(id);

    setWishlist((current) => (
      isSaved
        ? current.filter((itemId) => itemId !== id)
        : Array.from(new Set([...current, id]))
    ));

    if (!user?.accessToken) return;

    try {
      api.setTokens(user.accessToken, user.refreshToken);
      if (isSaved) {
        await api.removeFromWishlist(id);
      } else {
        await api.addToWishlist(id);
      }
    } catch (error) {
      setWishlist((current) => (
        isSaved
          ? Array.from(new Set([...current, id]))
          : current.filter((itemId) => itemId !== id)
      ));
      console.warn('Wishlist update failed.', error?.message || error);
    }
  }, [wishlist, user?.accessToken, user?.refreshToken]);

  const setSelectedProduct = (p) => {
    setSelectedProductState(p);
    setPage("product", { product: p });
  };
  const setSelectedBusiness = (b) => {
    setSelectedBusinessState(b);
    setStorefrontBiz(b);
    setPage("storefront", { biz: b });
  };
  const openStorefront = (biz) => {
    setSelectedBusinessState(biz);
    setStorefrontBiz(biz);
    setPage("storefront", { biz });
  };
  const showCatBar = ["home","search"].includes(page);
  const footerPages = ["about","howitworks","pricing","blog","faq","contact","report","advertise","privacy","userterms","cookies","refund"];
  const isDash = ["dashboard","settings"].includes(page);
  const hasVendorStorefront = user?.role === "VENDOR" && Boolean(vendorSettings?.storeId || user?.store?.id);

  useEffect(() => {
    routeStateRef.current = {
      page,
      searchQ,
      activeCategory,
      selectedProduct,
      storefrontBiz,
    };

    const nextUrl = buildAppUrl(page, {
      searchQ,
      activeCategory,
      product: selectedProduct,
      biz: storefrontBiz,
    });
    const currentUrl = `${window.location.pathname}${window.location.search}`;

    if (currentUrl !== nextUrl || !window.history.state?.page) {
      window.history.replaceState(routeStateRef.current, "", nextUrl);
    }

    document.title = `${APP_PAGE_TITLES[page] || "LBC"} — Lekki Business Connect`;
  }, [page, searchQ, activeCategory, selectedProduct, storefrontBiz]);

  useEffect(() => {
    const hydrateRouteState = (historyState) => {
      const resolvedState = historyState?.page ? historyState : resolveAppRoute(window.location);

      setPageState(resolvedState.page || "home");
      if (typeof resolvedState.searchQ === "string") setSearchQ(resolvedState.searchQ);
      if (resolvedState.activeCategory) setActiveCategory(resolvedState.activeCategory);
      if (Object.prototype.hasOwnProperty.call(resolvedState, "selectedProduct")) {
        setSelectedProductState(resolvedState.selectedProduct || null);
      }
      if (Object.prototype.hasOwnProperty.call(resolvedState, "storefrontBiz")) {
        setStorefrontBiz(resolvedState.storefrontBiz || null);
      }
    };

    hydrateRouteState(window.history.state);

    const handlePopState = (event) => hydrateRouteState(event.state);
    window.addEventListener("popstate", handlePopState);
    return () => window.removeEventListener("popstate", handlePopState);
  }, []);

  useEffect(() => {
    const route = resolveAppRoute(window.location);

    if (route.page === "product" && !selectedProduct && marketProducts.length) {
      const matchedProduct = findByRouteMatch(marketProducts, {
        id: route.productId,
        slug: route.productSlug,
        nameKey: "name",
      });
      if (matchedProduct) {
        setSelectedProductState(matchedProduct);
      }
    }

    if (route.page === "storefront" && !storefrontBiz && marketBusinesses.length) {
      const matchedBusiness = findByRouteMatch(marketBusinesses, {
        id: route.businessId,
        slug: route.businessSlug,
        nameKey: "name",
        slugKey: "slug",
      });
      if (matchedBusiness) {
        setSelectedBusinessState(matchedBusiness);
        setStorefrontBiz(matchedBusiness);
      }
    }
  }, [marketProducts, marketBusinesses, selectedProduct, storefrontBiz]);

  useEffect(() => {
    window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
  }, [page]);

  useEffect(() => {
    let active = true;

    const bootstrapSession = async () => {
      if (!api.accessToken) return;

      try {
        const me = await api.getMe();
        if (!active) return;

        setUser({
          ...(me || {}),
          accessToken: api.accessToken,
          refreshToken: api.refreshToken,
        });

        setVendorSettings((current) => ({
          ...current,
          name: me?.name || current.name,
          email: me?.email || current.email,
          phone: me?.phone || current.phone,
          ...(me?.notifications || {}),
        }));
      } catch {
        api.clearTokens();
        if (active) setUser(null);
      }
    };

    bootstrapSession();
    return () => { active = false; };
  }, []);

  // Load user store data when logged in
  useEffect(() => {
    if (!user?.accessToken) {
      setVendorSettings(s => ({ ...s, name:"", email:"", phone:"", bizName:"", bizCategory:"", bizLocation:"", whatsapp:"", bizPhone:"", bizEmail:"", bizDesc:"", logo:"", banner:"", showStockCount:true, storeCreatedAt:null, storeId:null }));
      return;
    }

    let active = true;
    const loadUserStore = async () => {
      try {
        api.setTokens(user.accessToken, user.refreshToken);
        const store = await api.getMyStore();
        if (active && store) {
          setVendorSettings(s => ({
            ...s,
            name: user.name || s.name,
            email: user.email || s.email,
            phone: user.phone || s.phone,
            ...(user.notifications || {}),
            bizName: store.bizName || "",
            bizCategory: store.category || "",
            bizLocation: store.location || "",
            whatsapp: store.whatsapp || "",
            bizPhone: store.bizPhone || "",
            bizEmail: store.bizEmail || "",
            bizDesc: store.bizDesc || "",
            logo: store.logo || "",
            banner: store.banner || "",
            accentColor: store.accentColor || "",
            showStockCount: store.showStockCount !== false,
            storeCreatedAt: store.createdAt || null,
            storeId: store.id || null,
          }));
        }
      } catch (err) {
        if (active) {
          setVendorSettings(s => ({ ...s, name: user.name || "", email: user.email || "", phone: user.phone || "", ...(user.notifications || {}) }));
        }
      }
    };

    loadUserStore();
    return () => { active = false; };
  }, [user?.accessToken, user?.email, user?.name]);

  useEffect(() => {
    refreshMarketplace({ preferCache: true }).catch((error) => {
      const cachedMarketplace = readMarketplaceCache();
      if (!cachedMarketplace) {
        setMarketBusinesses([]);
        setMarketProducts([]);
      }
      console.warn('Marketplace data load failed.', error?.message || error);
    });
  }, [refreshMarketplace]);

  useEffect(() => {
    writeWishlistCache(wishlist);
  }, [wishlist]);

  useEffect(() => {
    let active = true;

    if (!user?.accessToken) {
      setWishlist(readWishlistCache());
      return () => { active = false; };
    }

    const loadWishlist = async () => {
      try {
        api.setTokens(user.accessToken, user.refreshToken);
        const savedListings = await api.getWishlist();
        if (!active) return;

        const ids = Array.isArray(savedListings)
          ? savedListings.map((item) => item?.id).filter(Boolean)
          : [];

        setWishlist(ids);
      } catch (error) {
        if (active) {
          setWishlist(readWishlistCache());
        }
        console.warn('Wishlist load failed.', error?.message || error);
      }
    };

    loadWishlist();
    return () => { active = false; };
  }, [user?.accessToken, user?.refreshToken]);

  return (
    <div>
      <Navbar page={page} setPage={setPage} searchQ={searchQ} setSearchQ={setSearchQ} activeCategory={activeCategory} setActiveCategory={setActiveCategory} cart={cart} user={user} setUser={setUser} vendorSettings={vendorSettings} />
      {showCatBar && <CategoryBar activeCategory={activeCategory} setActiveCategory={setActiveCategory} setPage={setPage} />}
      {page==="home" && <HomePage setPage={setPage} searchQ={searchQ} setSearchQ={setSearchQ} activeCategory={activeCategory} setActiveCategory={setActiveCategory} wishlist={wishlist} toggleWish={toggleWish} setSelectedProduct={setSelectedProduct} setSelectedBusiness={setSelectedBusiness} user={user} hasVendorStorefront={hasVendorStorefront} products={marketProducts} businesses={marketBusinesses} />}
      {page==="search" && <SearchPage searchQ={searchQ} activeCategory={activeCategory} setSelectedProduct={setSelectedProduct} setSelectedBusiness={setSelectedBusiness} wishlist={wishlist} toggleWish={toggleWish} products={marketProducts} businesses={marketBusinesses} />}
      {page==="product" && selectedProduct && <ProductDetailPage product={selectedProduct} setPage={setPage} setSelectedBusiness={setSelectedBusiness} setSelectedProduct={setSelectedProduct} vendorSettings={vendorSettings} products={marketProducts} businesses={marketBusinesses} />}
      {page==="storefront" && <StorefrontPage biz={storefrontBiz} setPage={setPage} user={user} vendorSettings={vendorSettings} onProductClick={setSelectedProduct} products={marketProducts} businesses={marketBusinesses} />}
      {page==="signin" && <AuthPage setPage={setPage} setUser={setUser} />}
      {page==="onboarding" && <OnboardingPage setPage={setPage} user={user} setUser={setUser} refreshMarketplace={refreshMarketplace} />}
      {page==="cart" && <CartPage cart={cart} setCart={setCart} setPage={setPage} />}
      {page==="dashboard" && <DashboardPage user={user} setUser={setUser} setPage={setPage} vendorSettings={vendorSettings} refreshMarketplace={refreshMarketplace} />}
      {page==="settings" && <SettingsPage user={user} setUser={setUser} setPage={setPage} vendorSettings={vendorSettings} setVendorSettings={setVendorSettings} refreshMarketplace={refreshMarketplace} />}
      {page==="boostCallback" && <BoostCallbackPage setPage={setPage} setUser={setUser} />}
      {page==="about" && <AboutPage setPage={setPage} />}
      {page==="howitworks" && <HowItWorksPage setPage={setPage} />}
      {page==="pricing" && <PricingPage setPage={setPage} />}
      {page==="blog" && <BlogPage setPage={setPage} />}
      {page==="faq" && <FAQPage setPage={setPage} />}
      {page==="contact" && <ContactPage setPage={setPage} />}
      {page==="report" && <ReportPage setPage={setPage} />}
      {page==="advertise" && <AdvertisePage setPage={setPage} />}
      {page==="privacy" && <PrivacyPage setPage={setPage} />}
      {page==="userterms" && <UserTermsPage setPage={setPage} />}
      {page==="cookies" && <CookiePage setPage={setPage} />}
    </div>
  );
}

// ── SETTINGS PAGE ──
function SettingsPage({ user, setUser, setPage, vendorSettings, setVendorSettings, refreshMarketplace }) {
  const [local, setLocal] = useState({...vendorSettings, name: vendorSettings.name||user?.name||"", email: vendorSettings.email||user?.email||""});
  const [saved, setSaved] = useState({});
  const [activeSection, setActiveSection] = useState("personal");
  const [isCompactViewport, setIsCompactViewport] = useState(() => window.innerWidth <= 768);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => window.innerWidth <= 768);
  const [pwForm, setPwForm] = useState({old:"",newp:"",confirm:""});
  const [pwVisibility, setPwVisibility] = useState({old:false,newp:false,confirm:false});
  const [savingSection, setSavingSection] = useState("");
  const [saveError, setSaveError] = useState("");
  const [saveNotice, setSaveNotice] = useState("");
  const [mediaUploading, setMediaUploading] = useState({ logo:false, banner:false });
  const logoInputRef = useRef(null);
  const bannerInputRef = useRef(null);
  const navItemRefs = useRef({});
  const upd = (k,v) => setLocal(l=>({...l,[k]:v}));

  useEffect(() => {
    setLocal({ ...vendorSettings, name: vendorSettings.name||user?.name||"", email: vendorSettings.email||user?.email||"" });
  }, [vendorSettings, user?.email, user?.name, user?.phone]);

  useEffect(() => {
    const handleResize = () => {
      const compact = window.innerWidth <= 768;
      setIsCompactViewport(compact);
      if (compact) {
        setSidebarCollapsed(false);
      }
    };

    handleResize();
    window.addEventListener('resize', handleResize, { passive: true });
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  useEffect(() => {
    if (!isCompactViewport) return;
    const activeTab = navItemRefs.current[activeSection];
    activeTab?.scrollIntoView?.({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, [activeSection, isCompactViewport]);

  const markSaved = (section) => {
    setSaved(s=>({...s,[section]:true}));
    setTimeout(()=>setSaved(s=>({...s,[section]:false})),3000);
  };

  const applyStoreState = (store) => {
    if (!store) return;

    const nextStoreState = {
      bizName: store.bizName || "",
      bizCategory: store.category || "",
      bizLocation: store.location || "",
      whatsapp: store.whatsapp || "",
      bizPhone: store.bizPhone || "",
      bizEmail: store.bizEmail || "",
      bizDesc: store.bizDesc || "",
      logo: store.logo || "",
      banner: store.banner || "",
      showStockCount: store.showStockCount !== false,
      storeCreatedAt: store.createdAt || null,
      storeId: store.id || null,
      accentColor: store.accentColor || local.accentColor || "",
    };

    setVendorSettings((current) => ({ ...current, ...nextStoreState }));
    setLocal((current) => ({ ...current, ...nextStoreState }));
  };

  const persistSection = async (section, { silent = false } = {}) => {
    if (!user?.accessToken) {
      throw new Error('Please sign in again to save changes.');
    }

    api.setTokens(user.accessToken, user.refreshToken);

    if (!silent) {
      setSavingSection(section);
      setSaveError("");
      setSaveNotice("");
    }

    if (section === 'personal') {
      const payload = {};
      const trimmedName = local.name?.trim() || '';
      const trimmedPhone = local.phone?.trim() || '';

      if (!trimmedName) {
        throw new Error('Full name is required.');
      }

      if (trimmedName !== (user?.name || '')) payload.name = trimmedName;
      if (trimmedPhone !== (user?.phone || '')) payload.phone = trimmedPhone;

      if (Object.keys(payload).length) {
        const updatedUser = await api.updateMe(payload);
        setUser((current) => current ? ({ ...current, ...updatedUser, accessToken: current.accessToken, refreshToken: current.refreshToken }) : current);
        setVendorSettings((current) => ({ ...current, name: updatedUser.name || '', email: updatedUser.email || current.email || '', phone: updatedUser.phone || '' }));
        setLocal((current) => ({ ...current, name: updatedUser.name || '', email: updatedUser.email || current.email || '', phone: updatedUser.phone || '' }));
      }
    }

    if (section === 'store') {
      const payload = {
        bizName: local.bizName?.trim() || '',
        category: local.bizCategory?.trim() || '',
        location: local.bizLocation?.trim() || '',
        bizPhone: local.bizPhone?.trim() || '',
        whatsapp: local.whatsapp?.trim() || '',
        bizDesc: local.bizDesc?.trim() || '',
        showStockCount: local.showStockCount !== false,
      };

      const trimmedBizEmail = local.bizEmail?.trim() || '';
      if (trimmedBizEmail) {
        payload.bizEmail = trimmedBizEmail;
      }

      if (!payload.bizName || !payload.category || !payload.location) {
        throw new Error('Business name, category, and location are required.');
      }

      const store = vendorSettings.storeId
        ? await api.updateStore(payload)
        : await api.createStore(payload);

      if (!vendorSettings.storeId) {
        setUser((current) => current ? ({ ...current, role: 'VENDOR' }) : current);
      }

      applyStoreState(store);
      await refreshMarketplace?.();
    }

    if (section === 'security') {
      if (!pwForm.old || !pwForm.newp || !pwForm.confirm) {
        throw new Error('Complete all password fields before saving.');
      }

      if (pwForm.newp !== pwForm.confirm) {
        throw new Error('New password and confirmation do not match.');
      }

      await api.changePassword(pwForm.old, pwForm.newp);
      setPwForm({old:"",newp:"",confirm:""});
    }

    if (section === 'notifications') {
      const payload = {
        emailNotif: !!local.emailNotif,
        smsAlert: !!local.smsAlert,
        browserNotif: !!local.browserNotif,
        waLeads: !!local.waLeads,
        boostExpiry: !!local.boostExpiry,
        weeklyReport: !!local.weeklyReport,
      };

      const prefs = await api.updateNotifications(payload);
      setVendorSettings((current) => ({ ...current, ...prefs }));
      setLocal((current) => ({ ...current, ...prefs }));
    }

    if (section === 'appearance') {
      const appearancePayload = {
        showStockCount: local.showStockCount !== false,
      };

      if (local.accentColor) {
        appearancePayload.accentColor = local.accentColor;
      }

      if (vendorSettings.storeId) {
        const store = await api.updateStore(appearancePayload);
        applyStoreState(store);
        await refreshMarketplace?.();
      } else {
        setVendorSettings((current) => ({ ...current, accentColor: local.accentColor, showStockCount: local.showStockCount !== false }));
      }
    }

    if (!silent) {
      markSaved(section);
      setSaveNotice(section === 'security' ? 'Password updated successfully.' : 'Changes saved successfully.');
    }
  };

  const saveSection = async (section) => {
    try {
      await persistSection(section);
    } catch (error) {
      setSaveError(error.message || 'Failed to save changes.');
    } finally {
      setSavingSection("");
    }
  };

  const renderPasswordField = (fieldKey, placeholder) => (
    <div style={{position:"relative"}}>
      <SInput
        value={pwForm[fieldKey]}
        onChange={e=>setPwForm(p=>({...p,[fieldKey]:e.target.value}))}
        type={pwVisibility[fieldKey] ? "text" : "password"}
        placeholder={placeholder}
        style={{paddingRight:"2.75rem"}}
      />
      <button
        type="button"
        onClick={()=>setPwVisibility(v=>({...v,[fieldKey]:!v[fieldKey]}))}
        aria-label={pwVisibility[fieldKey] ? "Hide password" : "Show password"}
        style={{position:"absolute",right:".75rem",top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",color:"var(--muted)",cursor:"pointer",fontSize:".95rem",padding:0,lineHeight:1}}
      >
        {pwVisibility[fieldKey] ? "🙈" : "👁"}
      </button>
    </div>
  );

  const uploadStoreMedia = async (kind, file) => {
    if (!file) return;
    if (!user?.accessToken) {
      setSaveError('Please sign in again to upload images.');
      return;
    }

    try {
      setSaveError("");
      setSaveNotice("");
      setMediaUploading((current) => ({ ...current, [kind]: true }));
      api.setTokens(user.accessToken, user.refreshToken);

      if (!vendorSettings.storeId) {
        await persistSection('store', { silent: true });
      }

      const response = kind === 'logo'
        ? await api.uploadStoreLogo(file)
        : await api.uploadStoreBanner(file);

      const field = kind === 'logo' ? 'logo' : 'banner';
      const url = response.url || '';
      setLocal((current) => ({ ...current, [field]: url }));
      setVendorSettings((current) => ({ ...current, [field]: url }));
      await refreshMarketplace?.();
      markSaved('store');
      setSaveNotice(`${kind === 'logo' ? 'Logo' : 'Banner'} uploaded successfully.`);
    } catch (error) {
      setSaveError(error.message || `Failed to upload ${kind}.`);
    } finally {
      setMediaUploading((current) => ({ ...current, [kind]: false }));
    }
  };

  const saveAll = async () => {
    const sections = ['personal', 'store', 'notifications', 'appearance'];
    if (pwForm.old || pwForm.newp || pwForm.confirm) {
      sections.splice(2, 0, 'security');
    }

    try {
      setSavingSection('all');
      setSaveError('');
      setSaveNotice('');

      for (const section of sections) {
        await persistSection(section, { silent: true });
      }

      setSaved({personal:true,store:true,security:true,notifications:true,appearance:true});
      setTimeout(()=>setSaved({}),3000);
      setSaveNotice('All changes saved successfully.');
    } catch (error) {
      setSaveError(error.message || 'Failed to save all changes.');
    } finally {
      setSavingSection('');
    }
  };

  const SECTIONS = [
    {id:"personal",   icon:"👤", label:"Personal Info"},
    {id:"store",      icon:"🏬", label:"Store Profile"},
    {id:"security",   icon:"🔒", label:"Security"},
    {id:"notifications", icon:"🔔", label:"Notifications"},
    {id:"appearance", icon:"🎨", label:"Appearance"},
  ];

  const toggleSidebar = () => {
    if (isCompactViewport) return;
    setSidebarCollapsed((current) => !current);
  };
  const selectSection = (sectionId) => {
    setActiveSection(sectionId);
    if (isCompactViewport) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  const sidebarWidth = isCompactViewport ? '100%' : (sidebarCollapsed ? 84 : 220);
  const showSidebarLabels = isCompactViewport ? true : !sidebarCollapsed;

  return (
    <div className="settings-layout app-shell" style={{display:"flex",minHeight:"calc(100vh - 64px)",background:"var(--offwhite)"}}>

      {/* ── LEFT NAV ── */}
      <aside className={`settings-sidebar ${!isCompactViewport && sidebarCollapsed ? "is-collapsed" : "is-expanded"}`} style={{width:sidebarWidth,background:"#fff",borderRight:"1px solid var(--g200)",padding:isCompactViewport?".75rem":"1.25rem 0",flexShrink:0,position:"sticky",top:64,height:isCompactViewport?"auto":"calc(100vh - 64px)",minHeight:isCompactViewport?"auto":"calc(100vh - 64px)"}}>
        <div className="settings-sidebar-head" style={{padding:isCompactViewport?0:"0 1rem .9rem",marginBottom:isCompactViewport?0:".15rem",display:"flex",alignItems:"center",justifyContent:showSidebarLabels?"space-between":"center",gap:".75rem"}}>
          {showSidebarLabels && (
            <div>
              <div style={{fontFamily:"Syne",fontWeight:800,fontSize:".92rem",color:"var(--navy)"}}>Settings</div>
              <div style={{fontSize:".74rem",color:"var(--muted)"}}>Compact, mobile-first controls</div>
            </div>
          )}
          <button
            key={sidebarCollapsed ? 'settings-collapsed' : 'settings-open'}
            type="button"
            className="settings-toggle"
            onClick={toggleSidebar}
            aria-label={sidebarCollapsed ? 'Expand settings navigation' : 'Collapse settings navigation'}
            style={{width:40,height:40,borderRadius:12,border:"1px solid var(--g200)",background:sidebarCollapsed?"var(--navy)":"rgba(0,102,255,.08)",color:sidebarCollapsed?"#fff":"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",fontWeight:800,boxShadow:"0 10px 24px rgba(6,13,31,.08)"}}
          >
            <span className="settings-toggle-icon">⚙</span>
            <span className="settings-toggle-label">Settings</span>
          </button>
        </div>

        {/* User card */}
        <div className="settings-user-card" style={{padding:isCompactViewport?0:"0 1.25rem 1.25rem",marginBottom:sidebarCollapsed?0:".5rem",borderBottom:isCompactViewport||sidebarCollapsed?"none":"1px solid var(--g100)",display:"flex",alignItems:"center",gap:".75rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:".75rem",width:"100%",minWidth:0}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:"var(--navy)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:"1rem",flexShrink:0}}>
              {(local.name||"D")[0].toUpperCase()}
            </div>
            <div className="settings-user-meta" style={{flex:1,minWidth:0,maxWidth:"98%",marginRight:"2%",overflow:"hidden"}}>
              <div style={{fontWeight:700,fontSize:".88rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}}>{local.name||"Vendor"}</div>
              <div title={local.email} style={{fontSize:".72rem",color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}}>{local.email}</div>
            </div>
          </div>
        </div>

        {/* Nav items */}
        <div className="settings-nav-list">
        {SECTIONS.map(s=>(
          <button key={s.id} ref={(el)=>{ navItemRefs.current[s.id] = el; }} onClick={()=>selectSection(s.id)}
